<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atomic Dustbin Dan</title>

      radial-gradient(circle at 50% 0%, #20242c 0%, #0c0e12 70%);
    color:#e8ebef;

  }

  }

               inset 0 0 80px rgba(0,0,0,.5);
    image-rendering:pixelated;
    cursor:crosshair;
  }
  #hint{
    margin-top:10px; text-align:center;
    font-family:"Courier New",monospace; font-weight:bold;
    letter-spacing:1px; font-size:12px; color:#6f7884;
  }

</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="960" height="640"></canvas>
    <div id="hint">WASD <b>move</b> &nbsp;·&nbsp; MOUSE <b>aim</b> &nbsp;·&nbsp; CLICK <b>fire</b> &nbsp;·&nbsp; I O P K ; , . / <b>fire 8-way</b></div>
  </div>

<script>
"use strict";

/* =========================================================================
   ATOMIC DUSTBIN DAN — Core build v0.1
   Latest pass: Level 7 — Manager Bot (boss-tier) + homing missile + berserk pulse.
     - Manager Bot: rare slow ground pursuer (HP 6, 500 pts). Fires a slow-tracking
       homing missile (`kind:"homing"`) with a capped turn rate — outrunnable on
       straights, or lure it into a shelf to detonate harmlessly (small wall-AoE).
       Brief dashed-beam windup telegraphs the launch. On death, emits a berserk
       pulse (expanding orange ring) that buffs ALL nearby robots: speed ×1.7 and
       +2 melee dmg for 7 s. L7 is the first mixed-type level: Manager terminals
       plus Picker terminals, so the berserk pulse has targets to buff.
     - killEnemy now shows a score float for every enemy kill (previously only
       terminals did); no behaviour change, just feedback improvement.
     - Multi-type spawn loop: spawner now iterates all terminal types present, so
       any future mixed level works automatically.
   Earlier passes: Dan + soap + power-ups; Picker + destroyable Dispatch Terminal
   (L1); Forklift charge/LOS/shelf-smash (L2); Security taser bolt + shared enemy-
   projectile system (L3); Sorter cowardly arc-lobber (L4); Cleaner cone-spray +
   first STATUS EFFECT on Dan (slow, L5); Drone aerial bomber + `kind:"drop"` (L6).
   ALL enemies emerge from destroyable spawner-terminals. HP/power-ups/score persist.
   One primary enemy type per level (LEVEL_PLAN). Keyboard fire = compass 3x3.
   ========================================================================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

const VIEW_W = canvas.width;   // 960
const VIEW_H = canvas.height;  // 640

/* ---- Tunable config (everything balance-related lives here) ------------- */
const CFG = {
  TILE: 32,
  COLS: 40, ROWS: 30,            // world = 1280 x 960

  DAN_RADIUS: 12,
  DAN_SPEED: 185,               // px/sec
  DAN_HP: 20,
  DAN_IFRAME: 0.45,             // sec invulnerable after a melee hit
  KNOCKBACK_SPEED: 520,         // initial knockback velocity
  KNOCKBACK_FRICTION: 9,        // higher = stops sooner
  SLOW_FACTOR: 0.5,             // Dan's move speed multiplier while sprayed (Cleaner)

  SHOT_SPEED: 470,
  SHOT_RADIUS: 6,
  SHOT_RANGE: 360,              // px a bubble travels before fizzling
  SHOT_COOLDOWN: 0.16,          // sec between shots (base fire rate)
  SHOT_MAX_ON_SCREEN: 3,        // base cap
  MELEE_DMG_TO_BOT: 2,

  TERMINAL: { hp:4, points:300 },   // Dispatch Terminal — destroyable spawner

  // Power-ups (GDD 3) — shot-count based, fully stackable
  POWERUP_SHOTS: 75,            // enhanced shots granted per pickup
  TRIPLE_SPREAD: 0.22,         // rad between fan projectiles
  RAPID_MULT: 2,               // fire-rate multiplier while Rapid Fire active
  MAX_PICKUPS: 5,              // power-up pickups present in the level at once
  PICKUP_RESPAWN: 6,          // sec between topping the level back up to MAX
};

// Power-up pickup definitions (color + glyph for the badge + HUD)
const POWERUPS = {
  rapid:  { label:"RAPID",  glyph:"R", color:"#5fd2ff" },
  triple: { label:"TRIPLE", glyph:"3", color:"#ffb627" },
  bounce: { label:"BOUNCE", glyph:"B", color:"#b06bff" },
};
const POWERUP_KEYS = Object.keys(POWERUPS);

/* ---- Enemy roster (GDD 6) ------------------------------------------------
   One unified table. Every type now emits from destroyable spawner-terminals
   (the "Dispatch Terminal" generalized to all enemies). Per-type tuning:
     spawners = base # of terminals on that type's level (scales with level)
     preplace = how many to emit from terminals at level start
     interval = global spawn cadence; max = per-type cap on screen
   New enemy types get added here and to LEVEL_PLAN below. */
const ENEMY = {
  picker: {
    hp:1, speed:108, radius:11, points:50, dmg:1,
    spawners:3, max:22, interval:1.6, preplace:0,
  },
  forklift: {
    hp:5, speed:52, radius:16, points:200,
    dmgCharge:4, dmgContact:2,               // GDD 6: 4 on charge, 2 on contact
    sight:230, windup:0.45, chargeSpeed:330, maxCharge:340, recover:0.7,
    spawners:2, max:5, interval:3.4, preplace:3,
  },
  security: {
    hp:3, speed:142, radius:12, points:200,  // GDD 6: fast ranged pursuer
    dmgContact:1,                            // light zap if Dan mops into it (not in GDD; see STATUS)
    sight:360,                               // range at which it acquires Dan for LOS
    fireRange:330,                           // won't fire from further than this
    fireCd:0.85,                             // sec between bolts ("fast rate")
    firstFireMin:0.35,                       // grace before a freshly-spawned bot can fire
    windup:0.16,                             // brief telegraph; aim is latched at windup start
    // --- bolt (first user of the shared enemy-projectile system) ---
    boltSpeed:330, boltDmg:2, boltRadius:5, boltRange:430,
    spawners:2, max:6, interval:2.6, preplace:3,
  },
  sorter: {
    hp:2, speed:70, radius:12, points:100,   // GDD 6: cowardly lob attacker
    // "Always knows Dan." LOS flips mood: in cover -> advance+lob; exposed -> flee.
    fleeSpeed:168,                           // panicked scamper (much faster than advance)
    fleeJitter:2.6,                          // rad/s wander while fleeing (erratic)
    losCheckEvery:0.12,
    fireCd:1.8, firstFireMin:0.6,            // lob cadence (only while in cover)
    fireRange:140,                           // max lob distance; closes in first if farther
    // --- arc (second projectile kind: lobs OVER walls, time-based landing) ---
    arcDur:1.15,                             // flight time start->impact
    arcDmg:1, arcBlast:30,                   // impact radius around the landing point
    spawners:2, max:6, interval:2.4, preplace:3,
  },
  cleaner: {
    hp:2, speed:50, radius:13, points:100,   // GDD 6: debuffer / slow hazard
    // Patrols a FIXED route (a back-and-forth line down an aisle, or a small
    // rectangular loop) chosen at spawn and kept for life, spraying a short cone
    // AHEAD of its heading. Oblivious to Dan by default; flip aimAtDan to turn
    // toward Dan before spraying.
    aimAtDan:false,
    arriveDist:9,                            // how close counts as "reached waypoint"
    wpTimeout:5,                             // s before giving up on a stuck waypoint
    lineMinTiles:3,                          // shortest acceptable straight patrol run
    rectChance:0.35,                         // odds of trying a rectangular loop vs a line
    sprayGap:1.4, sprayWindup:0.35, sprayDur:1.6,   // off -> telegraph -> on cycle
    sprayRange:108, sprayHalfAngle:0.52,     // short ~60°-wide cone
    sprayMinClear:0.4,                       // only spray if >=40% of range is open ahead
    sprayDmg:1, tickEvery:0.6,               // 1 HP per tick while inside (GDD)
    slowDur:0.9,                             // movement-slow refreshed while inside
    spawners:2, max:6, interval:2.6, preplace:3,
  },
  drone: {
    hp:2, speed:122, radius:12, points:150,  // GDD 6: aerial bomber, ignores walls
    // FLYING: free mover (no moveBody/walls). Seeks a hover spot ABOVE Dan and
    // drops a package bomb straight down ITS OWN column (bomb x = drone x). Only
    // commits a drop when it's at/above Dan and roughly lined up over him, so the
    // bomb always falls downward onto him. Bombs ignore walls / need no LOS —
    // you can't hide, only move out from under it.
    flying:true,
    hoverAbove:220,                          // preferred vertical standoff ABOVE Dan
    weaveAmp:70, weaveRate:1.4,              // horizontal sway around Dan's column
    altitude:22,                             // visual elevation (shadow offset below)
    dropRange:300, dropCd:1.7, firstFireMin:0.7,
    dropAlignX:80,                           // max |drone.x - Dan.x| to commit a drop
    // --- drop (vertical descent down the drone's OWN column) ---
    dropDur:0.9,                             // descent + telegraph window (dodge time)
    dropMinFall:46,                          // floor on the visual fall distance
    dropDmg:2, dropBlast:36,                 // GDD: 2 HP/hit; AoE around the landing
    baseR:9,                                 // bomb base size (scaled 2x->1x as it falls)
    spawners:2, max:4, interval:2.8, preplace:3,
  },
  manager: {
    hp:6, speed:72, radius:14, points:500,   // GDD 6: rare boss — slow ground pursuer
    dmgContact:0,                            // pure ranged; no contact damage
    sight:380, fireRange:340,
    fireCd:3.5, firstFireMin:1.0, windup:0.4,
    // --- homing missile (new kind; slow-tracking, outrunnable, lures into walls) ---
    missileSpeed:90, missileDmg:3, missileRadius:7,
    missileRange:580, missileTurnRate:1.4,   // rad/s max steer; sprint = outrun it
    missileBlast:24,                         // small AoE if it hits a wall or Dan
    // --- on-death berserk pulse ---
    berserRadius:220,                        // how far the pulse reaches from death point
    berserDur:7.0,                           // seconds berserk lasts on nearby robots
    berserSpeedMult:1.7,                     // speed multiplier while berserk
    berserDmgBonus:2,                        // added to melee damage while berserk
    spawners:1, max:2, interval:8.0, preplace:1,
  },
};

// Which single enemy type populates each test level (one type per level).
// Extend as enemies are added; levels beyond the list reuse the last entry.
const LEVEL_PLAN = ["picker", "forklift", "security", "sorter", "cleaner", "drone", "manager"];
function levelType(){
  return LEVEL_PLAN[Math.min(GAME.level - 1, LEVEL_PLAN.length - 1)];
}

/* ---- Palette (grounded in the warehouse / janitorial world) ------------- */
const COL = {
  floorA:"#1c1f26", floorB:"#20242c", grid:"#2a2f39",
  shelfTop:"#9c6b3a", shelfSide:"#6f4a25", shelfEdge:"#caa06a",
  steel:"#454b55",
  danBody:"#2f6fb0", danTrim:"#1d4f86", danSkin:"#e3b58a", danMop:"#c8cdd4",
  bubbleFill:"rgba(120,210,255,0.32)", bubbleRim:"rgba(190,240,255,0.95)",
  picker:"#c0392b", pickerPanel:"#e6e9ec", pickerEye:"#ffd23f",
  forkliftBody:"#e0a32e", forkliftDark:"#8a6418", forkliftFork:"#c9ccd1", chargeWarn:"#ff5b4d",
  securityBody:"#2b3340", securityDark:"#1a202a", securityTrim:"#cfd6df", securityVisor:"#ff3b5c",
  bolt:"#8be4ff", boltCore:"#ffffff", boltGlow:"rgba(110,200,255,0.5)",
  sorterBody:"#7a8a5c", sorterDark:"#55633f", sorterEye:"#ffe27a",
  box:"#c79a5b", boxDark:"#9c7338", boxTape:"#e6d4ad",
  cleanerBody:"#2f8f86", cleanerDark:"#1f6259", cleanerTank:"#bfe9d2", cleanerNozzle:"#cfd6df",
  spray:"#9bff7a", sprayDark:"#5fd06a",
  droneBody:"#3b4a63", droneDark:"#26303f", droneRotor:"rgba(180,214,255,0.45)",
  droneEye:"#ff5b6e", droneLight:"#7fe0ff", droneShadow:"rgba(0,0,0,0.30)",
  bomb:"#b5742e", bombDark:"#7c4d1a", bombStripe:"#ffd23f", bombLight:"#ff4d4d",
  managerBody:"#1e2d40", managerDark:"#111c28", managerTrim:"#8090a8", managerEye:"#e04020",
  missile:"#703020", missileFin:"#9aa0a8", missileWarhead:"#ff5020",
  terminal:"#3a4250", terminalLit:"#5dff8f",
  amber:"#ffb627", soap:"#5fd2ff", atomic:"#5dff8f", text:"#e8ebef",
};

// Spawner-terminal emitter tint by the enemy type it produces (readability for
// when levels eventually mix types). Falls back to the generic green.
const TERMINAL_TINT = {
  picker: "#ff6a5a", forklift: "#ffc24a", security: COL.bolt, sorter: "#b7c98a",
  cleaner: COL.spray, drone: "#a6c8ff", manager: "#ff7020",
};

/* ---- Input -------------------------------------------------------------- */
const keys = {};
const mouse = { sx:VIEW_W/2, sy:VIEW_H/2, down:false, moved:false };

// Keyboard directional fire grid — 3x3 block on the right hand (compass dirs).
// (Diverges from GDD 4.3; see STATUS.) Center key `l` = no-fire.
//   i  o  p        NW  N  NE
//   k  l  ;   ==>  W  (·)  E
//   ,  .  /        SW  S  SE
// Angles in screen space (y-down): right=0, down=+PI/2, up=-PI/2.
const FIRE_ANGLES = {
  "i": -Math.PI*0.75, "o": -Math.PI*0.5,  "p": -Math.PI*0.25,
  "k":  Math.PI,                          ";":  0,
  ",":  Math.PI*0.75, ".":  Math.PI*0.5,  "/":  Math.PI*0.25,
};
// Stack of currently-held fire keys; top = most recent = active.
const fireKeyStack = [];

// Every key the game consumes — preventDefault these during play so symbols
// like ' and / don't trigger the browser's quick-find.
const HANDLED_KEYS = new Set(["w","a","s","d","e","f", ...Object.keys(FIRE_ANGLES)]);

addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  if (GAME.state === "playing" && HANDLED_KEYS.has(k)) e.preventDefault();
  if (!keys[k] && k in FIRE_ANGLES){
    const i = fireKeyStack.indexOf(k);
    if (i !== -1) fireKeyStack.splice(i, 1);
    fireKeyStack.push(k);
  }
  keys[k] = true;
  if ((GAME.state === "title" || GAME.state === "dead") && (e.key === " " || e.key === "Enter")) newGame();
});
addEventListener("keyup", e => {
  const k = e.key.toLowerCase();
  keys[k] = false;
  const i = fireKeyStack.indexOf(k);
  if (i !== -1) fireKeyStack.splice(i, 1);
});

// Returns the active keyboard fire angle, or null if no fire key is held.
function keyboardFireAngle(){
  for (let i = fireKeyStack.length - 1; i >= 0; i--){
    if (keys[fireKeyStack[i]]) return FIRE_ANGLES[fireKeyStack[i]];
  }
  return null;
}

canvas.addEventListener("mousemove", e => {
  const r = canvas.getBoundingClientRect();
  mouse.sx = (e.clientX - r.left) * (VIEW_W / r.width);
  mouse.sy = (e.clientY - r.top)  * (VIEW_H / r.height);
});
canvas.addEventListener("mousedown", () => {
  mouse.down = true;
  if (GAME.state === "title" || GAME.state === "dead") newGame();
});
addEventListener("mouseup", () => { mouse.down = false; });
// Touch fallback so it isn't dead on mobile
canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  if (GAME.state === "title" || GAME.state === "dead") newGame();
}, {passive:false});

/* ---- World / tile map --------------------------------------------------- */
// map[y][x]: 0 floor, 1 wall (shelf)
let map = [];

function isWall(tx, ty){
  if (tx < 0 || ty < 0 || tx >= CFG.COLS || ty >= CFG.ROWS) return true;
  return map[ty][tx] === 1;
}

function generateWarehouse(){
  map = [];
  for (let y = 0; y < CFG.ROWS; y++){
    const row = [];
    for (let x = 0; x < CFG.COLS; x++){
      // perimeter walls
      row.push((x===0||y===0||x===CFG.COLS-1||y===CFG.ROWS-1) ? 1 : 0);
    }
    map.push(row);
  }
  // Shelf rows: horizontal runs with aisle gaps — reads as a warehouse.
  for (let y = 4; y < CFG.ROWS - 3; y += 4){
    let x = 3;
    while (x < CFG.COLS - 3){
      const len = 3 + Math.floor(Math.random()*4);
      for (let i = 0; i < len && x < CFG.COLS - 3; i++, x++){
        map[y][x] = 1;
      }
      x += 2 + Math.floor(Math.random()*3); // aisle gap
    }
  }
  // Carve a clear spawn pocket in the middle for Dan.
  const cx = (CFG.COLS/2)|0, cy = (CFG.ROWS/2)|0;
  for (let y = cy-2; y <= cy+2; y++)
    for (let x = cx-2; x <= cx+2; x++)
      if (x>0&&y>0&&x<CFG.COLS-1&&y<CFG.ROWS-1) map[y][x] = 0;
}

function randomFloorTile(minDistFromCenter){
  const cx = CFG.COLS/2, cy = CFG.ROWS/2;
  for (let tries = 0; tries < 400; tries++){
    const tx = 1 + ((Math.random()*(CFG.COLS-2))|0);
    const ty = 1 + ((Math.random()*(CFG.ROWS-2))|0);
    if (map[ty][tx] !== 0) continue;
    if (minDistFromCenter){
      const d = Math.hypot(tx-cx, ty-cy);
      if (d < minDistFromCenter) continue;
    }
    return { x:(tx+0.5)*CFG.TILE, y:(ty+0.5)*CFG.TILE };
  }
  return { x:VIEW_W, y:VIEW_H };
}

// ---- Tile helpers used by Cleaner patrol routing ----
function tileFloor(tx, ty){
  return tx > 0 && ty > 0 && tx < CFG.COLS-1 && ty < CFG.ROWS-1 && map[ty][tx] === 0;
}
function tileCenter(tx, ty){ return { x:(tx+0.5)*CFG.TILE, y:(ty+0.5)*CFG.TILE }; }
// Consecutive floor tiles from (tx,ty) stepping (dx,dy), capped at `cap`.
function tileClearRun(tx, ty, dx, dy, cap){
  let n = 0, cx = tx + dx, cy = ty + dy;
  while (n < cap && tileFloor(cx, cy)){ n++; cx += dx; cy += dy; }
  return n;
}
// Whole rectangle perimeter (ox,oy)..(ox+w,oy+h) is floor?
function rectPerimeterClear(ox, oy, w, h){
  for (let i = 0; i <= w; i++)
    if (!tileFloor(ox+i, oy) || !tileFloor(ox+i, oy+h)) return false;
  for (let j = 0; j <= h; j++)
    if (!tileFloor(ox, oy+j) || !tileFloor(ox+w, oy+j)) return false;
  return true;
}
function nearestWaypoint(e){
  let bi = 0, bd = Infinity;
  for (let i = 0; i < e.waypoints.length; i++){
    const w = e.waypoints[i];
    const dd = (w.x-e.x)*(w.x-e.x) + (w.y-e.y)*(w.y-e.y);
    if (dd < bd){ bd = dd; bi = i; }
  }
  return bi;
}

// Build a Cleaner's FIXED patrol route once at spawn (kept for life): a small
// rectangular LOOP if a fully-walkable one fits, else a back-and-forth LINE down
// the longest clear aisle through its spawn tile. Falls back to a 2-tile shuffle
// if boxed in. Sets e.waypoints / e.wpIndex / e.patrolLoop / e.wpDir.
function buildCleanerPatrol(e){
  const d = ENEMY.cleaner;
  const tx = (e.x / CFG.TILE)|0, ty = (e.y / CFG.TILE)|0;
  const CAP = 12;

  // Sometimes try a rectangular loop with a fully-clear perimeter.
  if (Math.random() < d.rectChance){
    for (let tries = 0; tries < 24; tries++){
      const w = 3 + (Math.random()*3|0), h = 3 + (Math.random()*3|0);
      const ox = tx - (Math.random()*(w+1)|0), oy = ty - (Math.random()*(h+1)|0);
      if (rectPerimeterClear(ox, oy, w, h)){
        e.waypoints = [
          tileCenter(ox, oy),     tileCenter(ox+w, oy),
          tileCenter(ox+w, oy+h), tileCenter(ox, oy+h),
        ];
        e.patrolLoop = true; e.wpDir = 1;
        e.wpIndex = nearestWaypoint(e);
        return;
      }
    }
  }

  // LINE: pick the axis with the longest clear run through this tile.
  let best = null;
  for (const [ax, ay] of [[1,0],[0,1]]){
    const pos = tileClearRun(tx, ty, ax, ay, CAP);
    const neg = tileClearRun(tx, ty, -ax, -ay, CAP);
    const total = pos + neg;
    if (!best || total > best.total) best = { ax, ay, pos, neg, total };
  }
  if (best && best.total >= d.lineMinTiles){
    e.waypoints = [
      tileCenter(tx + best.ax*best.pos, ty + best.ay*best.pos),
      tileCenter(tx - best.ax*best.neg, ty - best.ay*best.neg),
    ];
  } else {
    // Boxed in: tiny ping-pong to whatever single clear neighbour exists.
    const here = tileCenter(tx, ty);
    let other = here;
    for (const [ax, ay] of [[1,0],[-1,0],[0,1],[0,-1]]){
      if (tileFloor(tx+ax, ty+ay)){ other = tileCenter(tx+ax, ty+ay); break; }
    }
    e.waypoints = [here, other];
  }
  e.patrolLoop = false; e.wpDir = 1;
  e.wpIndex = nearestWaypoint(e);
  if (e.wpIndex === e.waypoints.length - 1) e.wpDir = -1;
}

// Advance to the next patrol waypoint (loop wraps; line ping-pongs).
function advancePatrol(e){
  if (e.patrolLoop){
    e.wpIndex = (e.wpIndex + 1) % e.waypoints.length;
  } else {
    e.wpIndex += e.wpDir;
    if (e.wpIndex >= e.waypoints.length - 1){ e.wpIndex = e.waypoints.length - 1; e.wpDir = -1; }
    else if (e.wpIndex <= 0){ e.wpIndex = 0; e.wpDir = 1; }
  }
}

/* ---- Entities ----------------------------------------------------------- */
const GAME = {
  state:"title",       // title | playing | levelclear | dead
  score:0,
  high:0,
  level:1,
  transition:0,        // countdown timer for the level-clear splash
};

let dan, shots, enemies, terminals, camera, spawnTimer;
let powerups, pickups, marks, floats, pickupTimer, exit;
let ebolts;   // shared enemy-projectile pool (Security taser bolt is the first user)

// Full reset — new run from level 1. HP, power-ups, score all cleared.
function newGame(){
  dan = {
    x:0, y:0, r:CFG.DAN_RADIUS,
    hp:CFG.DAN_HP, maxHp:CFG.DAN_HP,
    angle:0, cooldown:0, iframe:0, kvx:0, kvy:0,
    slow:0, sprayTick:0,        // Cleaner debuff: slow timer + DoT tick gate
  };
  powerups = { rapid:0, triple:0, bounce:0 };
  GAME.score = 0;
  GAME.level = 1;
  buildLevel();
  GAME.state = "playing";
}

// Advance to a fresh level — HP, power-ups, and score persist.
function nextLevel(){
  GAME.level++;
  buildLevel();
  GAME.state = "playing";
}

// (Re)generate the level around the existing Dan. Transient state is cleared;
// Dan's hp/powerups/score are left untouched so they carry across levels.
function buildLevel(){
  generateWarehouse();

  // Reposition Dan into the cleared central pocket, reset combat transients.
  dan.x = (CFG.COLS/2 + 0.5) * CFG.TILE;
  dan.y = (CFG.ROWS/2 + 0.5) * CFG.TILE;
  dan.cooldown = 0; dan.iframe = 0; dan.kvx = 0; dan.kvy = 0;
  dan.slow = 0; dan.sprayTick = 0;

  shots = [];
  enemies = [];
  terminals = [];
  pickups = [];
  marks = [];
  floats = [];
  ebolts = [];
  spawnTimer = 0.6;
  pickupTimer = 0;

  // Every level gets destroyable spawner-terminals of its enemy type (the
  // Dispatch Terminal generalized to all enemies). Count scales with level.
  const type = levelType();
  const d = ENEMY[type];
  const termCount = Math.min((d.spawners || 3) + ((GAME.level - 1) / 2 | 0), 6);
  for (let i = 0; i < termCount; i++){
    const p = randomFloorTile(6);
    terminals.push({
      x:p.x, y:p.y, r:14, pulse:Math.random()*Math.PI*2,
      hp:CFG.TERMINAL.hp, hitFlash:0, type,    // terminal knows what it emits
    });
  }
  // Initial population emerges from the terminals (not floor-placed).
  for (let i = 0; i < (d.preplace || 0); i++) spawnFromTerminal(type);

  // Manager level: also seed a couple of Picker terminals so the berserk pulse
  // has targets to buff. This is the first mixed-type level (GDD intent).
  if (type === "manager"){
    for (let i = 0; i < 2; i++){
      const pp = randomFloorTile(6);
      terminals.push({ x:pp.x, y:pp.y, r:14, pulse:Math.random()*Math.PI*2,
        hp:CFG.TERMINAL.hp, hitFlash:0, type:"picker" });
    }
    for (let i = 0; i < 3; i++) spawnFromTerminal("picker");
  }

  // One exit door, placed away from Dan's spawn (GDD 8.1).
  const ep = randomFloorTile(8);
  exit = { x:ep.x, y:ep.y, r:18, pulse:0 };

  // Seed power-up pickups for testing convenience.
  while (pickups.length < CFG.MAX_PICKUPS) spawnPickup();

  camera = { x:0, y:0 };
}

function spawnPickup(type){
  if (!type) type = POWERUP_KEYS[(Math.random()*POWERUP_KEYS.length)|0];
  const p = randomFloorTile(3);
  pickups.push({ type, x:p.x, y:p.y, r:13, bob:Math.random()*Math.PI*2 });
}

function addFloat(x, y, text, color){
  floats.push({ x, y, text, color, life:1.1, vy:-26 });
}

// Create one enemy of the given type at a position.
function spawnEnemy(type, pos){
  const d = ENEMY[type];
  const e = {
    type, x:pos.x, y:pos.y, r:d.radius,
    hp:d.hp, maxHp:d.hp, speed:d.speed,
    bob:Math.random()*Math.PI*2,
    spawn:0.4,            // brief grow-in so they don't blink in
    hitFlash:0,
  };
  if (type === "forklift"){
    e.mode = "roam";      // roam -> lock (windup) -> charge -> recover
    e.timer = 0;
    e.losCheck = Math.random() * 0.2;
    e.cdir = 0;
    e.chargeDist = 0;
  }
  if (type === "security"){
    e.losCheck = Math.random() * 0.15;       // throttled LOS poll
    e.canSee = false;
    e.fireCd = d.firstFireMin + Math.random() * 0.4;
    e.winding = 0;        // >0 => telegraphing a shot; aim latched in e.aim
    e.aim = 0;
  }
  if (type === "sorter"){
    e.losCheck = Math.random() * 0.12;
    e.canSee = false;     // exposed? flee : advance + lob
    e.fireCd = d.firstFireMin + Math.random() * 0.6;
    e.wander = Math.random() * Math.PI * 2;  // erratic-flee heading, random-walks
  }
  if (type === "cleaner"){
    buildCleanerPatrol(e);                  // fixed route chosen at spawn, kept for life
    e.mode = "patrol";                      // patrol -> spray(windup->active) -> patrol
    e.sprayCd = d.sprayGap * (0.5 + Math.random());
    e.windup = 0; e.sprayT = 0; e.spraying = false;
    e.wpTimer = d.wpTimeout;
    const w = e.waypoints[e.wpIndex];       // face toward the first waypoint
    e.face = Math.atan2(w.y - e.y, w.x - e.x);
  }
  if (type === "drone"){
    e.flying = true;                                   // flagged for walls/future Dustbin pull
    e.dropCd = d.firstFireMin + Math.random() * 0.6;   // grace before first bomb
    e.weavePhase = Math.random() * Math.PI * 2;        // horizontal sway around Dan's column
    e.rotor = Math.random() * Math.PI * 2;             // spinning-rotor phase
  }
  if (type === "manager"){
    e.losCheck = Math.random() * 0.2;
    e.canSee = false;
    e.fireCd = d.firstFireMin + Math.random() * 0.8;   // stagger opening shot
    e.winding = 0;      // >0 = telegraphing launch; aim latched in e.aim
    e.aim = 0;
    // e.berserk starts undefined; berserSpd/berserDmg handle that gracefully
  }
  enemies.push(e);
}

// Emit one enemy of `type` from a random matching spawner-terminal.
// Returns false if that type has no terminals left (all destroyed).
function spawnFromTerminal(type){
  const tlist = terminals.filter(t => t.type === type);
  if (tlist.length === 0) return false;
  const t = tlist[(Math.random()*tlist.length)|0];
  spawnEnemy(type, { x:t.x, y:t.y });
  t.spawnFlash = 0.18;        // brief emit pulse on the terminal
  return true;
}

// Spawn a wave member for the level's type, respecting that type's cap.
// All enemies now emerge from terminals; no terminals -> no spawns.
function spawnWave(type){
  const d = ENEMY[type];
  const count = enemies.reduce((n, e) => n + (e.type === type ? 1 : 0), 0);
  if (count >= d.max) return;
  spawnFromTerminal(type);
}

/* ---- Collision helpers -------------------------------------------------- */
// Treat moving bodies as AABB (half = radius) for wall resolution.
function bodyHitsWall(x, y, r){
  const minX = ((x - r)/CFG.TILE)|0, maxX = ((x + r)/CFG.TILE)|0;
  const minY = ((y - r)/CFG.TILE)|0, maxY = ((y + r)/CFG.TILE)|0;
  for (let ty = minY; ty <= maxY; ty++)
    for (let tx = minX; tx <= maxX; tx++)
      if (isWall(tx, ty)) return true;
  return false;
}

// Move with per-axis resolution so bodies slide along walls.
function moveBody(b, dx, dy){
  if (dx){
    b.x += dx;
    if (bodyHitsWall(b.x, b.y, b.r)) b.x -= dx;
  }
  if (dy){
    b.y += dy;
    if (bodyHitsWall(b.x, b.y, b.r)) b.y -= dy;
  }
}

/* ---- Update ------------------------------------------------------------- */
function update(dt){
  // Level-clear splash: freeze the world, then build the next level.
  if (GAME.state === "levelclear"){
    GAME.transition -= dt;
    if (GAME.transition <= 0) nextLevel();
    return;
  }

  if (GAME.state !== "playing") return;

  updateDan(dt);
  updateShots(dt);

  // Spawn from every terminal type present in the level, each capped by its own max.
  // Pure levels have one type; mixed levels (e.g. Manager + Pickers) cycle both.
  const type = levelType();
  spawnTimer -= dt;
  if (spawnTimer <= 0){
    const seen = new Set();
    for (const t of terminals){ if (!seen.has(t.type)){ spawnWave(t.type); seen.add(t.type); } }
    spawnTimer = ENEMY[type].interval;
  }

  updateEnemies(dt);
  updateEbolts(dt);
  updatePickups(dt);
  updateEffects(dt);
  updateCamera();

  for (const t of terminals){
    t.pulse += dt * 3;
    if (t.hitFlash > 0) t.hitFlash -= dt;
    if (t.spawnFlash > 0) t.spawnFlash -= dt;
  }
  exit.pulse += dt * 4;

  // Reach the exit -> level ends immediately (GDD 8.2).
  if (Math.hypot(exit.x - dan.x, exit.y - dan.y) <= exit.r + dan.r){
    GAME.high = Math.max(GAME.high, GAME.score);
    GAME.state = "levelclear";
    GAME.transition = 1.6;
    return;
  }

  // Top the level back up with power-up pickups over time (for testing).
  pickupTimer -= dt;
  if (pickupTimer <= 0){
    if (pickups.length < CFG.MAX_PICKUPS) spawnPickup();
    pickupTimer = CFG.PICKUP_RESPAWN;
  }

  if (dan.hp <= 0){
    GAME.high = Math.max(GAME.high, GAME.score);
    GAME.state = "dead";
  }
}

function updatePickups(dt){
  for (let i = pickups.length - 1; i >= 0; i--){
    const p = pickups[i];
    p.bob += dt * 3;
    if (Math.hypot(p.x - dan.x, p.y - dan.y) <= p.r + dan.r){
      // Stack: add a fresh batch of enhanced shots to this counter.
      powerups[p.type] += CFG.POWERUP_SHOTS;
      const def = POWERUPS[p.type];
      addFloat(p.x, p.y - 14, "+" + def.label, def.color);
      pickups.splice(i, 1);
    }
  }
}

function updateEffects(dt){
  for (let i = marks.length - 1; i >= 0; i--){
    marks[i].life -= dt * 1.6;
    if (marks[i].life <= 0) marks.splice(i, 1);
  }
  for (let i = floats.length - 1; i >= 0; i--){
    const f = floats[i];
    f.y += f.vy * dt;
    f.life -= dt;
    if (f.life <= 0) floats.splice(i, 1);
  }
}

function updateDan(dt){
  // Aim priority: a held keyboard fire key wins; otherwise face the mouse.
  const kbAngle = keyboardFireAngle();
  if (kbAngle !== null){
    dan.angle = kbAngle;
  } else {
    const mwx = mouse.sx + camera.x;
    const mwy = mouse.sy + camera.y;
    dan.angle = Math.atan2(mwy - dan.y, mwx - dan.x);
  }

  // movement input
  let ix = 0, iy = 0;
  if (keys["w"]) iy -= 1;
  if (keys["s"]) iy += 1;
  if (keys["a"]) ix -= 1;
  if (keys["d"]) ix += 1;
  if (ix || iy){
    const len = Math.hypot(ix, iy);
    ix /= len; iy /= len;
  }
  // Cleaner spray slows Dan's movement while the debuff is active.
  const moveSpeed = CFG.DAN_SPEED * (dan.slow > 0 ? CFG.SLOW_FACTOR : 1);
  moveBody(dan, ix * moveSpeed * dt, iy * moveSpeed * dt);

  // knockback velocity (decays via friction)
  if (dan.kvx || dan.kvy){
    moveBody(dan, dan.kvx * dt, dan.kvy * dt);
    const decay = Math.exp(-CFG.KNOCKBACK_FRICTION * dt);
    dan.kvx *= decay; dan.kvy *= decay;
    if (Math.hypot(dan.kvx, dan.kvy) < 8){ dan.kvx = 0; dan.kvy = 0; }
  }

  if (dan.iframe > 0) dan.iframe -= dt;
  if (dan.cooldown > 0) dan.cooldown -= dt;
  if (dan.slow > 0) dan.slow -= dt;
  if (dan.sprayTick > 0) dan.sprayTick -= dt;

  // fire — mouse held OR a directional fire key held
  const wantFire = mouse.down || kbAngle !== null;

  // Active power-up flags this trigger (GDD 3).
  const rf  = powerups.rapid  > 0;
  const tri = powerups.triple > 0;
  const bn  = powerups.bounce > 0;

  // Max shots on screen by stack state (GDD 3.2): 3 base, +3 RF, +3 Triple.
  const cap = CFG.SHOT_MAX_ON_SCREEN + (rf?3:0) + (tri?3:0);
  // Rapid Fire doubles fire rate (halves cooldown).
  const cooldown = CFG.SHOT_COOLDOWN / (rf ? CFG.RAPID_MULT : 1);

  const volley = tri ? 3 : 1;
  if (wantFire && dan.cooldown <= 0 && shots.length + volley <= cap){
    fireVolley(dan.angle, tri, bn);
    dan.cooldown = cooldown;
    // One trigger consumes one shot from each active counter.
    if (rf)  powerups.rapid--;
    if (tri) powerups.triple--;
    if (bn)  powerups.bounce--;
  }
}

// Fire one trigger event: 3-projectile fan if Triple, else single.
function fireVolley(angle, triple, bounce){
  if (triple){
    const s = CFG.TRIPLE_SPREAD;
    fireBubble(angle - s, triple, bounce);
    fireBubble(angle,     triple, bounce);
    fireBubble(angle + s, triple, bounce);
  } else {
    fireBubble(angle, triple, bounce);
  }
}

function fireBubble(angle, big, bounce){
  const muzzle = dan.r + 6;
  shots.push({
    x: dan.x + Math.cos(angle) * muzzle,
    y: dan.y + Math.sin(angle) * muzzle,
    vx: Math.cos(angle) * CFG.SHOT_SPEED,
    vy: Math.sin(angle) * CFG.SHOT_SPEED,
    r: big ? CFG.SHOT_RADIUS * 1.5 : CFG.SHOT_RADIUS,
    traveled: 0,
    wob: Math.random()*Math.PI*2,
    big: !!big,          // Triple Shot -> larger, opaque cleaning pod
    bounce: !!bounce,    // Bounce Shot -> ricochet off walls
  });
}

function updateShots(dt){
  for (let i = shots.length - 1; i >= 0; i--){
    const s = shots[i];
    const stepX = s.vx * dt, stepY = s.vy * dt;
    s.wob += dt * 12;

    if (s.bounce){
      // Per-axis reflection so bubbles ricochet off tile walls (GDD 3).
      let nx = s.x + stepX, ny = s.y + stepY;
      let bounced = false;
      if (isWall((nx / CFG.TILE)|0, (s.y / CFG.TILE)|0)){
        s.vx = -s.vx; nx = s.x + s.vx * dt; bounced = true;
      }
      if (isWall((s.x / CFG.TILE)|0, (ny / CFG.TILE)|0)){
        s.vy = -s.vy; ny = s.y + s.vy * dt; bounced = true;
      }
      // Corner case: still inside a wall after axis checks — reflect both.
      if (!bounced && isWall((nx / CFG.TILE)|0, (ny / CFG.TILE)|0)){
        s.vx = -s.vx; s.vy = -s.vy;
        nx = s.x + s.vx * dt; ny = s.y + s.vy * dt; bounced = true;
      }
      if (bounced) marks.push({ x:s.x, y:s.y, life:1 }); // soapy splat
      s.x = nx; s.y = ny;
    } else {
      s.x += stepX; s.y += stepY;
    }
    s.traveled += Math.hypot(stepX, stepY);

    // Expire by range; non-bounce shots also fizzle on the first wall hit.
    const inWall = isWall((s.x / CFG.TILE)|0, (s.y / CFG.TILE)|0);
    if (s.traveled >= CFG.SHOT_RANGE || (!s.bounce && inWall)){
      shots.splice(i, 1);
      continue;
    }

    // hit enemies, then dispatch terminals
    let consumed = false;
    for (let j = enemies.length - 1; j >= 0; j--){
      const e = enemies[j];
      if (e.spawn > 0) continue;
      if (Math.hypot(e.x - s.x, e.y - s.y) <= e.r + s.r){
        e.hp -= 1; e.hitFlash = 0.1;
        shots.splice(i, 1);
        if (e.hp <= 0) killEnemy(j);
        consumed = true;
        break;
      }
    }
    if (consumed) continue;
    for (let k = terminals.length - 1; k >= 0; k--){
      const t = terminals[k];
      if (Math.hypot(t.x - s.x, t.y - s.y) <= t.r + s.r){
        t.hp -= 1; t.hitFlash = 0.12;
        shots.splice(i, 1);
        if (t.hp <= 0) destroyTerminal(k);
        break;
      }
    }
  }
}

function updateEnemies(dt){
  for (let i = enemies.length - 1; i >= 0; i--){
    const e = enemies[i];
    if (e.hitFlash > 0) e.hitFlash -= dt;
    if (e.spawn > 0){ e.spawn -= dt; continue; }
    e.bob += dt * 8;
    if (e.berserk > 0) e.berserk -= dt;   // decay on any enemy that received the pulse

    if (e.type === "forklift") updateForklift(e, dt);
    else if (e.type === "security") updateSecurity(e, dt);
    else if (e.type === "sorter") updateSorter(e, dt);
    else if (e.type === "cleaner") updateCleaner(e, dt);
    else if (e.type === "drone") updateDrone(e, dt);
    else if (e.type === "manager") updateManager(e, dt);
    else updatePicker(e, dt);

    // melee contact with Dan (single event; re-entry needed via knockback)
    const dx = dan.x - e.x, dy = dan.y - e.y;
    const dist = Math.hypot(dx, dy) || 1;
    if (dist <= e.r + dan.r){
      let dmg;
      if (e.type === "forklift")
        dmg = (e.mode === "charge") ? ENEMY.forklift.dmgCharge : ENEMY.forklift.dmgContact;
      else if (e.type === "security")
        dmg = ENEMY.security.dmgContact;   // light contact zap (ranged unit)
      else if (e.type === "sorter" || e.type === "cleaner" || e.type === "drone" || e.type === "manager")
        dmg = 0;                           // hazard/ranged units: no contact damage (GDD 6)
      else
        dmg = ENEMY.picker.dmg;
      // Berserk bonus: pulse from a dying Manager buffs nearby robots' melee (GDD 6.1.9)
      if (dmg > 0 && e.berserk > 0) dmg += ENEMY.manager.berserDmgBonus;
      meleeContact(e, dx, dy, dist, dmg);
    }
  }
}

// Speed multiplier from the Manager's berserk pulse. Safe for any enemy type:
// e.berserk is undefined on spawns and undefined > 0 is false.
function berserSpd(e){ return (e.berserk > 0) ? ENEMY.manager.berserSpeedMult : 1; }

// Basic chaser (Picker).
function updatePicker(e, dt){
  const dx = dan.x - e.x, dy = dan.y - e.y;
  const dist = Math.hypot(dx, dy) || 1;
  moveBody(e, (dx/dist) * e.speed * berserSpd(e) * dt, (dy/dist) * e.speed * berserSpd(e) * dt);
}

// Slow tank that locks line-of-sight and charges, smashing shelves (GDD 6).
function updateForklift(e, dt){
  const d = ENEMY.forklift;
  if (e.mode === "roam"){
    const dx = dan.x - e.x, dy = dan.y - e.y;
    const dist = Math.hypot(dx, dy) || 1;
    moveBody(e, (dx/dist) * e.speed * dt, (dy/dist) * e.speed * dt);
    e.losCheck -= dt;
    if (e.losCheck <= 0){
      e.losCheck = 0.2;
      if (dist < d.sight && hasLineOfSight(e.x, e.y, dan.x, dan.y)){
        e.mode = "lock"; e.timer = d.windup; e.cdir = Math.atan2(dy, dx);
      }
    }
  } else if (e.mode === "lock"){
    e.timer -= dt;                       // wind-up telegraph before the charge
    if (e.timer <= 0){ e.mode = "charge"; e.chargeDist = 0; }
  } else if (e.mode === "charge"){
    const step = d.chargeSpeed * dt;
    const nx = e.x + Math.cos(e.cdir) * step;
    const ny = e.y + Math.sin(e.cdir) * step;
    const tx = (nx / CFG.TILE)|0, ty = (ny / CFG.TILE)|0;
    if (isWall(tx, ty)){
      if (isBorderTile(tx, ty)){
        e.mode = "recover"; e.timer = d.recover;   // can't smash the outer wall
      } else {
        destroyShelf(tx, ty);                       // plow through shelving
        e.x = nx; e.y = ny;
      }
    } else {
      e.x = nx; e.y = ny;
    }
    e.chargeDist += step;
    if (e.chargeDist > d.maxCharge){ e.mode = "recover"; e.timer = d.recover; }
  } else { // recover
    e.timer -= dt;
    if (e.timer <= 0) e.mode = "roam";
  }
}

// Fast ranged pursuer: chases Dan and fires straight taser bolts on a fast
// cooldown whenever it has line-of-sight and Dan is within fire range (GDD 6).
function updateSecurity(e, dt){
  const d = ENEMY.security;
  const dx = dan.x - e.x, dy = dan.y - e.y;
  const dist = Math.hypot(dx, dy) || 1;

  // Aggressive pursuit — always close on Dan (it fires while moving).
  moveBody(e, (dx/dist) * e.speed * berserSpd(e) * dt, (dy/dist) * e.speed * berserSpd(e) * dt);

  // Throttled line-of-sight check (reuses the Forklift's LOS helper).
  e.losCheck -= dt;
  if (e.losCheck <= 0){
    e.losCheck = 0.15;
    e.canSee = dist < d.sight && hasLineOfSight(e.x, e.y, dan.x, dan.y);
  }

  if (e.winding > 0){
    // Telegraphing: aim was latched at windup start, so Dan can sidestep it.
    e.winding -= dt;
    if (e.winding <= 0){
      fireEnemyBolt(e, e.aim, d);
      e.fireCd = d.fireCd;
    }
  } else {
    e.fireCd -= dt;
    if (e.fireCd <= 0 && e.canSee && dist <= d.fireRange){
      e.aim = Math.atan2(dy, dx);   // latch aim; bolt flies straight, no homing
      e.winding = d.windup;
    }
  }
}

// Cowardly lob attacker (GDD 6). Always knows Dan's position; line of sight
// only sets its mood. Exposed (has LOS) -> panics and flees fast in an erratic
// scatter, holding fire. In cover (no LOS) -> feels safe, advances on Dan, and
// lobs an arcing box that clears the walls between them.
function updateSorter(e, dt){
  const d = ENEMY.sorter;
  const dx = dan.x - e.x, dy = dan.y - e.y;
  const dist = Math.hypot(dx, dy) || 1;

  e.losCheck -= dt;
  if (e.losCheck <= 0){
    e.losCheck = d.losCheckEvery;
    e.canSee = hasLineOfSight(e.x, e.y, dan.x, dan.y);
  }

  if (e.canSee){
    // Exposed -> panic. Flee away from Dan with a wandering jitter so the path
    // reads as a freak-out rather than a straight retreat.
    e.wander += (Math.random() - 0.5) * d.fleeJitter * dt * 6;
    const away = Math.atan2(-dy, -dx);
    const ang = away + Math.sin(e.wander) * 0.9;
    const fl = d.fleeSpeed * berserSpd(e);
    moveBody(e, Math.cos(ang) * fl * dt, Math.sin(ang) * fl * dt);
  } else {
    // In cover -> advance toward Dan, and bombard once within lob range.
    moveBody(e, (dx/dist) * e.speed * berserSpd(e) * dt, (dy/dist) * e.speed * berserSpd(e) * dt);
    e.fireCd -= dt;
    if (e.fireCd <= 0 && dist <= d.fireRange){
      fireEnemyArc(e, dan.x, dan.y, d);   // target Dan's position at lob time
      e.fireCd = d.fireCd;
    }
    // Out of range: fireCd stays ready (<=0), so it lobs the instant it closes in.
  }
}

// Debuffer / slow hazard (GDD 6). Follows a FIXED patrol route (built at spawn)
// and sprays a short cone AHEAD of its heading; the spray ticks damage AND
// refreshes a movement-slow on Dan while he's inside it. Oblivious to Dan by
// default (cone points where it walks); set ENEMY.cleaner.aimAtDan to face Dan.
function updateCleaner(e, dt){
  const d = ENEMY.cleaner;

  if (e.mode === "spray"){
    // Hold position; telegraph (windup) then emit the damaging cone.
    e.spraying = false;
    if (e.windup > 0){
      e.windup -= dt;
    } else {
      e.spraying = true;
      e.sprayT -= dt;
      if (danInSprayCone(e, d)) applySpray(d);
      if (e.sprayT <= 0){
        e.mode = "patrol"; e.sprayCd = d.sprayGap; e.spraying = false;
        e.wpTimer = d.wpTimeout;   // don't count the spray pause against the stuck-timer
      }
    }
    return;
  }

  // --- patrol: walk toward the current waypoint along the fixed route ---
  const w = e.waypoints[e.wpIndex];
  const dx = w.x - e.x, dy = w.y - e.y;
  const dist = Math.hypot(dx, dy) || 1;
  e.face = Math.atan2(dy, dx);                       // face the direction of travel
  moveBody(e, (dx/dist) * e.speed * berserSpd(e) * dt, (dy/dist) * e.speed * berserSpd(e) * dt);

  // Advance on arrival, or if stuck against geometry for too long.
  e.wpTimer -= dt;
  if (dist <= d.arriveDist || e.wpTimer <= 0){
    advancePatrol(e);
    e.wpTimer = d.wpTimeout;
  }

  // Spray on cadence, but only when facing reasonably open space — so it never
  // sprays straight into a shelf it's hugging (and the visible cone has room).
  e.sprayCd -= dt;
  if (e.sprayCd <= 0){
    const clearAhead = coneRayDist(e.x, e.y, e.face, d.sprayRange);
    if (clearAhead >= d.sprayRange * d.sprayMinClear){
      if (d.aimAtDan) e.face = Math.atan2(dan.y - e.y, dan.x - e.x);
      e.mode = "spray"; e.windup = d.sprayWindup; e.sprayT = d.sprayDur;
    } else {
      e.sprayCd = 0.4;   // facing a wall — retry shortly once it's in the open
    }
  }
}

// Is Dan inside this Cleaner's active cone? (range + half-angle + LOS, so the
// spray is blocked by shelves.)
function danInSprayCone(e, d){
  const dx = dan.x - e.x, dy = dan.y - e.y;
  const dist = Math.hypot(dx, dy);
  if (dist > d.sprayRange + dan.r) return false;
  let diff = Math.atan2(dy, dx) - e.face;
  while (diff >  Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  if (Math.abs(diff) > d.sprayHalfAngle) return false;
  return hasLineOfSight(e.x, e.y, dan.x, dan.y);
}

// March from (x0,y0) along `ang` until a wall tile or `maxR`; returns the clear
// distance (just short of the wall). Used to clip the Cleaner's spray cone to
// shelf geometry so it visually STOPS at walls instead of bleeding through them.
function coneRayDist(x0, y0, ang, maxR){
  const cx = Math.cos(ang), cy = Math.sin(ang), step = 6;
  for (let len = step; len <= maxR; len += step){
    if (isWall(((x0 + cx*len)/CFG.TILE)|0, ((y0 + cy*len)/CFG.TILE)|0)) return len - step;
  }
  return maxR;
}

// Refresh Dan's slow and apply a damage tick (rate-limited by dan.sprayTick so
// overlapping cones can't multi-tick in one frame; tick timer decays in updateDan).
function applySpray(d){
  dan.slow = d.slowDur;
  if (dan.sprayTick <= 0){
    dan.hp -= d.sprayDmg;
    dan.sprayTick = d.tickEvery;
  }
}

// Aerial bomber (GDD 6). FLYING: ignores ground walls entirely — uses its own
// free mover (NOT moveBody), staying only inside the outer border. Seeks a hover
// spot ABOVE Dan (swaying horizontally around his column), then DROPS a package
// bomb straight down its OWN column onto Dan's row. Only commits a drop when it's
// at/above Dan and lined up over him, so the bomb always falls downward.
function updateDrone(e, dt){
  const d = ENEMY.drone;
  e.rotor += dt * 26;                      // fast rotor spin (visual)
  e.weavePhase += dt * d.weaveRate;        // horizontal sway phase

  // Target a point ABOVE Dan, swaying around his column so it isn't a sitting
  // target and the drop column varies.
  const tgx = dan.x + Math.sin(e.weavePhase) * d.weaveAmp;
  const tgy = dan.y - d.hoverAbove;        // smaller y = higher on screen = "above"
  const mx = tgx - e.x, my = tgy - e.y;
  const ml = Math.hypot(mx, my);
  if (ml > 1){
    e.x += (mx / ml) * e.speed * dt;
    e.y += (my / ml) * e.speed * dt;
  }

  // Flier: no wall collision; just stay inside the playable interior (border).
  const lo = CFG.TILE + e.r, hiX = (CFG.COLS - 1) * CFG.TILE - e.r,
        hiY = (CFG.ROWS - 1) * CFG.TILE - e.r;
  e.x = clamp(e.x, lo, hiX);
  e.y = clamp(e.y, lo, hiY);

  // Drop straight down its OWN column (bomb x = drone x) onto Dan's row — but
  // only when it's at/above Dan AND roughly lined up over him.
  e.dropCd -= dt;
  const linedUp = Math.abs(e.x - dan.x) <= d.dropAlignX;
  const above   = e.y <= dan.y;
  const inRange = Math.hypot(dan.x - e.x, dan.y - e.y) <= d.dropRange;
  if (e.dropCd <= 0 && linedUp && above && inRange){
    fireEnemyDrop(e, e.x, dan.y, d);       // x = drone's column, y = Dan's row
    e.dropCd = d.dropCd;
  }
}

// Rare boss-tier pursuer (GDD 6.1.9). Slow ground unit; fires a homing missile on
// a long cooldown whenever it has line-of-sight + range. Brief windup telegraphs the
// launch. On death (handled in killEnemy) emits a berserk pulse buffing nearby robots.
function updateManager(e, dt){
  const d = ENEMY.manager;
  const dx = dan.x - e.x, dy = dan.y - e.y;
  const dist = Math.hypot(dx, dy) || 1;

  // Slow ground pursuer — berserk also boosts its own speed (rare: two Managers)
  moveBody(e, (dx/dist) * e.speed * berserSpd(e) * dt, (dy/dist) * e.speed * berserSpd(e) * dt);

  // Throttled LOS check
  e.losCheck -= dt;
  if (e.losCheck <= 0){
    e.losCheck = 0.25;
    e.canSee = dist < d.sight && hasLineOfSight(e.x, e.y, dan.x, dan.y);
  }

  if (e.winding > 0){
    // Telegraph: aim latched at windup start so Dan can sidestep the launch.
    e.winding -= dt;
    if (e.winding <= 0){
      fireEnemyHoming(e, d);
      e.fireCd = d.fireCd;
    }
  } else {
    e.fireCd -= dt;
    if (e.fireCd <= 0 && e.canSee && dist <= d.fireRange){
      e.aim = Math.atan2(dy, dx);   // latch initial heading; missile steers from there
      e.winding = d.windup;
    }
  }
}

// Fire a homing missile from Manager `e`. The missile's initial direction is toward
// Dan, but it can steer each frame (capped turn rate — outrunnable, lure-into-walls).
function fireEnemyHoming(e, d){
  const angle = Math.atan2(dan.y - e.y, dan.x - e.x);
  const muzzle = e.r + 6;
  ebolts.push({
    kind: "homing",
    x: e.x + Math.cos(angle) * muzzle,
    y: e.y + Math.sin(angle) * muzzle,
    vx: Math.cos(angle) * d.missileSpeed,
    vy: Math.sin(angle) * d.missileSpeed,
    speed:    d.missileSpeed,
    turnRate: d.missileTurnRate,
    r:    d.missileRadius,
    dmg:  d.missileDmg,
    blast: d.missileBlast,
    traveled: 0,
    range: d.missileRange,
    spin: Math.random() * Math.PI * 2,
  });
}

/* ---- Shared enemy-projectile system (GDD 6 ranged enemies) ---------------
   One pool (`ebolts`) drives every robot's ranged attack. Each entry carries a
   `kind` that selects its motion + how it expires, so later enemies reuse this:
     bolt   (Security)  — straight line, dies on walls            [implemented]
     arc    (Sorter)    — lobbed box, ignores walls, time-based landing + AoE [implemented]
     drop   (Drone)     — bomb descends onto a fixed point, ignores walls + AoE [implemented]
     cone   (Cleaner)   — short spray, applies slow debuff   [handled outside pool]
     homing (Manager)   — slow-tracking missile                       [TODO]
   Collision vs Dan funnels through the SAME i-frame window as melee so two
   sources can't both land in one instant.                                     */

// Spawn one bolt from enemy `e` traveling along `angle`. `d` = that type's
// ENEMY entry (supplies boltSpeed / boltDmg / boltRadius / boltRange).
function fireEnemyBolt(e, angle, d){
  const muzzle = e.r + 4;
  ebolts.push({
    kind: "bolt",
    x: e.x + Math.cos(angle) * muzzle,
    y: e.y + Math.sin(angle) * muzzle,
    vx: Math.cos(angle) * d.boltSpeed,
    vy: Math.sin(angle) * d.boltSpeed,
    r: d.boltRadius,
    dmg: d.boltDmg,
    traveled: 0,
    range: d.boltRange,
    spin: Math.random() * Math.PI * 2,
  });
}

// Lob a cardboard box from `e` toward (tx,ty) — Dan's position at fire time.
// The arc clears walls and lands after `arcDur`, then checks a blast radius.
function fireEnemyArc(e, tx, ty, d){
  const dist = Math.hypot(tx - e.x, ty - e.y);
  ebolts.push({
    kind: "arc",
    x: e.x, y: e.y,            // current ground position (interpolated)
    x0: e.x, y0: e.y,         // launch point
    tx, ty,                   // landing point
    t: 0, dur: d.arcDur,
    peak: 24 + dist * 0.10,   // lob higher on longer throws (visual only)
    height: 0, k: 0,
    dmg: d.arcDmg, blast: d.arcBlast,
    r: 9, spin: Math.random() * Math.PI * 2,
  });
}

// Drop a package bomb from a Drone straight down its column onto (tx,ty) — the
// drone's own x and Dan's row. The visual fall distance is the drone->row gap,
// so the bomb appears to detach from the drone and descend. Reticle + growing
// shadow are the telegraph. Ignores walls (stopsOnWall:false), so cover is no
// defense.
function fireEnemyDrop(e, tx, ty, d){
  const fall = Math.max(d.dropMinFall, ty - e.y);   // start at the drone's height
  ebolts.push({
    kind: "drop",
    tx, ty,                   // landing point: drone's column, Dan's row
    t: 0, dur: d.dropDur,     // descent + telegraph window
    h0: fall, height: fall,   // visual fall = drone->row gap
    dmg: d.dropDmg, blast: d.dropBlast,
    stopsOnWall: false,
    r: d.baseR, spin: Math.random() * Math.PI * 2,
  });
}

function updateEbolts(dt){
  for (let i = ebolts.length - 1; i >= 0; i--){
    const b = ebolts[i];
    b.spin += dt * 22;

    // Lobbed kinds resolve on a timer and ignore walls; handle separately.
    if (b.kind === "arc"){
      if (updateArc(b, dt)) ebolts.splice(i, 1);
      continue;
    }
    if (b.kind === "drop"){
      if (updateDrop(b, dt)) ebolts.splice(i, 1);
      continue;
    }
    if (b.kind === "homing"){
      if (updateHoming(b, dt)) ebolts.splice(i, 1);
      continue;
    }

    // --- straight kinds (bolt): move, expire on range/wall, hit on overlap ---
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.traveled += Math.hypot(b.vx, b.vy) * dt;

    const stopsOnWall = (b.kind === "bolt");
    const inWall = isWall((b.x / CFG.TILE)|0, (b.y / CFG.TILE)|0);
    if (b.traveled >= b.range || (stopsOnWall && inWall)){
      ebolts.splice(i, 1);
      continue;
    }

    // Hit Dan. Absorbed by an active i-frame window (counts as a blocked hit).
    if (Math.hypot(b.x - dan.x, b.y - dan.y) <= b.r + dan.r){
      if (dan.iframe <= 0) hitDanRanged(b);
      ebolts.splice(i, 1);
    }
  }
}

// Advance a lobbed box: interpolate ground position launch->landing over `dur`
// with a parabolic height for the draw. Ignores walls entirely. On landing,
// splat + AoE check around the impact point. Returns true when finished.
function updateArc(b, dt){
  b.t += dt;
  b.k = Math.min(b.t / b.dur, 1);
  b.x = b.x0 + (b.tx - b.x0) * b.k;
  b.y = b.y0 + (b.ty - b.y0) * b.k;
  b.height = Math.sin(b.k * Math.PI) * b.peak;
  if (b.k >= 1){
    marks.push({ x:b.tx, y:b.ty, life:1 });           // impact burst
    if (dan.iframe <= 0 &&
        Math.hypot(dan.x - b.tx, dan.y - b.ty) <= b.blast + dan.r){
      hitDanArea(b.tx, b.ty, b.dmg);
    }
    return true;
  }
  return false;
}

// Advance a dropped package bomb: the landing point (tx,ty) is fixed; the bomb
// descends vertically onto it over `dur` with an accelerating fall. Ignores
// walls entirely. On landing: splat + debris + AoE check. Returns true when done.
function updateDrop(b, dt){
  b.t += dt;
  const k = Math.min(b.t / b.dur, 1);
  b.height = b.h0 * (1 - k * k);                       // ease-in (accelerating drop)
  if (k >= 1){
    marks.push({ x:b.tx, y:b.ty, life:1 });           // impact burst
    for (let p = 0; p < 5; p++){                       // chunky package debris
      marks.push({
        x: b.tx + (Math.random()-0.5)*20,
        y: b.ty + (Math.random()-0.5)*20,
        life: 1, kind:"debris", size: 5 + Math.random()*4,
      });
    }
    if (dan.iframe <= 0 &&
        Math.hypot(dan.x - b.tx, dan.y - b.ty) <= b.blast + dan.r){
      hitDanArea(b.tx, b.ty, b.dmg);
    }
    return true;
  }
  return false;
}

// Advance a homing missile: steer toward Dan each frame by up to `turnRate` rad/s
// (capped so it's outrunnable on straights). Stops on wall impact (small AoE) or
// Dan overlap, and expires at max range. Returns true when finished.
function updateHoming(b, dt){
  // Steer toward Dan with a capped turn so the missile can be outrun or lured.
  const curAngle = Math.atan2(b.vy, b.vx);
  const targetAngle = Math.atan2(dan.y - b.y, dan.x - b.x);
  let diff = targetAngle - curAngle;
  while (diff >  Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  const turn = Math.sign(diff) * Math.min(Math.abs(diff), b.turnRate * dt);
  const newAngle = curAngle + turn;
  b.vx = Math.cos(newAngle) * b.speed;
  b.vy = Math.sin(newAngle) * b.speed;

  b.x += b.vx * dt;
  b.y += b.vy * dt;
  b.traveled += b.speed * dt;

  // Expire on range.
  if (b.traveled >= b.range) return true;

  // Wall impact: small AoE burst, then remove. Harmless if Dan is out of blast.
  if (isWall((b.x / CFG.TILE)|0, (b.y / CFG.TILE)|0)){
    marks.push({ x:b.x, y:b.y, life:1 });
    if (dan.iframe <= 0 && Math.hypot(dan.x - b.x, dan.y - b.y) <= b.blast + dan.r)
      hitDanArea(b.x, b.y, b.dmg);
    return true;
  }

  // Hit Dan.
  if (Math.hypot(b.x - dan.x, b.y - dan.y) <= b.r + dan.r){
    if (dan.iframe <= 0) hitDanRanged(b);
    return true;
  }
  return false;
}

// Apply a ranged hit to Dan: shared i-frame + a lighter knockback along the
// bolt's travel direction.
function hitDanRanged(b){
  dan.hp -= b.dmg;
  dan.iframe = CFG.DAN_IFRAME;
  const a = Math.atan2(b.vy, b.vx);
  dan.kvx = Math.cos(a) * CFG.KNOCKBACK_SPEED * 0.6;
  dan.kvy = Math.sin(a) * CFG.KNOCKBACK_SPEED * 0.6;
}

// Area impact (arc landing): shared i-frame + radial knockback away from the
// blast center.
function hitDanArea(x, y, dmg){
  dan.hp -= dmg;
  dan.iframe = CFG.DAN_IFRAME;
  const a = Math.atan2(dan.y - y, dan.x - x);
  dan.kvx = Math.cos(a) * CFG.KNOCKBACK_SPEED * 0.6;
  dan.kvy = Math.sin(a) * CFG.KNOCKBACK_SPEED * 0.6;
}

// dx,dy point from the enemy toward Dan; knock Dan AWAY (down +dx/dy).
function meleeContact(e, dx, dy, dist, dmg){
  e.hp -= CFG.MELEE_DMG_TO_BOT;   // Dan's mop strikes on contact
  e.hitFlash = 0.1;

  if (dmg > 0 && dan.iframe <= 0){
    dan.hp -= dmg;
    dan.iframe = CFG.DAN_IFRAME;
    dan.kvx = (dx/dist) * CFG.KNOCKBACK_SPEED;
    dan.kvy = (dy/dist) * CFG.KNOCKBACK_SPEED;
  }

  if (e.hp <= 0){
    const idx = enemies.indexOf(e);
    if (idx >= 0) killEnemy(idx);
  }
}

function killEnemy(index){
  const e = enemies[index];
  GAME.score += ENEMY[e.type].points;
  addFloat(e.x, e.y - 16, "+" + ENEMY[e.type].points, COL.amber);

  // Manager on-death: emit a berserk pulse that buffs all nearby robots (GDD 6.1.9).
  // Berserk effect: increased speed + increased melee damage for `berserDur` seconds.
  // If two Managers die near the same robot, the timer refreshes to whichever is longer.
  if (e.type === "manager"){
    const md = ENEMY.manager;
    for (const other of enemies){
      if (other === e) continue;   // will be spliced out below
      if (Math.hypot(other.x - e.x, other.y - e.y) <= md.berserRadius){
        other.berserk = Math.max(other.berserk || 0, md.berserDur);
      }
    }
    // Expanding ring telegraph for the pulse (drawn in drawMarks as "berserk" kind)
    marks.push({ x:e.x, y:e.y, life:1.5, kind:"berserk" });
  }

  enemies.splice(index, 1);
}

function destroyTerminal(index){
  const t = terminals[index];
  GAME.score += CFG.TERMINAL.points;
  addFloat(t.x, t.y - 18, "+" + CFG.TERMINAL.points, COL.atomic);
  terminals.splice(index, 1);
}

function isBorderTile(tx, ty){
  return tx === 0 || ty === 0 || tx === CFG.COLS-1 || ty === CFG.ROWS-1;
}

// Sample along the segment; blocked if any interior wall tile lies between.
function hasLineOfSight(x0, y0, x1, y1){
  const dx = x1 - x0, dy = y1 - y0;
  const steps = Math.ceil(Math.hypot(dx, dy) / (CFG.TILE * 0.4));
  for (let s = 1; s < steps; s++){
    const t = s / steps;
    const px = x0 + dx*t, py = y0 + dy*t;
    if (isWall((px/CFG.TILE)|0, (py/CFG.TILE)|0)) return false;
  }
  return true;
}

// Clear an interior shelf tile and kick up a dust puff.
function destroyShelf(tx, ty){
  if (isBorderTile(tx, ty) || !isWall(tx, ty)) return;
  map[ty][tx] = 0;
  const cx = (tx + 0.5) * CFG.TILE, cy = (ty + 0.5) * CFG.TILE;
  for (let p = 0; p < 6; p++){
    marks.push({
      x: cx + (Math.random()-0.5)*22,
      y: cy + (Math.random()-0.5)*22,
      life: 1, kind:"debris", size: 6 + Math.random()*5,
    });
  }
}

function updateCamera(){
  // follow Dan, clamped to world bounds
  const worldW = CFG.COLS * CFG.TILE, worldH = CFG.ROWS * CFG.TILE;
  camera.x = clamp(dan.x - VIEW_W/2, 0, Math.max(0, worldW - VIEW_W));
  camera.y = clamp(dan.y - VIEW_H/2, 0, Math.max(0, worldH - VIEW_H));
}

function clamp(v, a, b){ return v < a ? a : v > b ? b : v; }

/* ---- Render ------------------------------------------------------------- */
function render(){
  ctx.clearRect(0, 0, VIEW_W, VIEW_H);

  if (GAME.state === "title"){ drawTitle(); return; }

  ctx.save();
  ctx.translate(-Math.round(camera.x), -Math.round(camera.y));

  drawFloor();
  drawWalls();
  drawMarks();
  drawExit();
  drawTerminals();
  drawPickups();
  drawShots();
  drawEnemies();
  drawEbolts();
  drawDan();
  drawFloats();

  ctx.restore();

  if (GAME.state === "playing") drawExitPointer();
  drawHUD();
  if (GAME.state === "levelclear") drawLevelClear();
  if (GAME.state === "dead") drawGameOver();
}

// Glowing EXIT door — the level-end goal (GDD 8.1/8.2).
function drawExit(){
  const e = exit;
  const glow = 0.5 + 0.5 * Math.sin(e.pulse);
  // floor glow
  ctx.fillStyle = "rgba(93,255,143," + (0.12 + 0.10*glow).toFixed(3) + ")";
  ctx.beginPath();
  ctx.arc(e.x, e.y, e.r + 12, 0, Math.PI*2);
  ctx.fill();
  // door frame
  const w = 34, h = 40;
  ctx.fillStyle = "#1a2a1e";
  ctx.fillRect(e.x - w/2, e.y - h/2, w, h);
  ctx.strokeStyle = COL.atomic;
  ctx.lineWidth = 2;
  ctx.strokeRect(e.x - w/2 + 1, e.y - h/2 + 1, w - 2, h - 2);
  // open doorway
  ctx.fillStyle = "#0c130d";
  ctx.fillRect(e.x - w/2 + 5, e.y - h/2 + 6, w - 10, h - 11);
  // EXIT sign
  ctx.fillStyle = COL.atomic;
  ctx.globalAlpha = 0.7 + 0.3*glow;
  ctx.fillRect(e.x - 13, e.y - h/2 - 8, 26, 9);
  ctx.globalAlpha = 1;
  ctx.fillStyle = "#0c130d";
  ctx.font = "bold 8px 'Arial Black', sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("EXIT", e.x, e.y - h/2 - 3);
  // downward arrow inside
  ctx.fillStyle = COL.atomic;
  ctx.beginPath();
  ctx.moveTo(e.x, e.y + 6);
  ctx.lineTo(e.x - 6, e.y - 2);
  ctx.lineTo(e.x + 6, e.y - 2);
  ctx.closePath();
  ctx.fill();
}

// Edge arrow pointing toward the exit when it's off-screen.
function drawExitPointer(){
  const sx = exit.x - camera.x, sy = exit.y - camera.y;
  const margin = 26;
  if (sx >= margin && sx <= VIEW_W - margin && sy >= margin && sy <= VIEW_H - margin) return;
  const cx = VIEW_W/2, cy = VIEW_H/2;
  const ang = Math.atan2(sy - cy, sx - cx);
  const px = clamp(sx, margin, VIEW_W - margin);
  const py = clamp(sy, margin, VIEW_H - margin);
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(ang);
  ctx.fillStyle = COL.atomic;
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  ctx.moveTo(12, 0);
  ctx.lineTo(-6, -8);
  ctx.lineTo(-6, 8);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
  ctx.fillStyle = COL.atomic;
  ctx.font = "bold 9px 'Courier New', monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("EXIT", clamp(sx, margin, VIEW_W - margin), clamp(sy, margin, VIEW_H - margin) + 16);
}

function drawFloor(){
  const T = CFG.TILE;
  const x0 = Math.floor(camera.x / T), x1 = Math.ceil((camera.x + VIEW_W) / T);
  const y0 = Math.floor(camera.y / T), y1 = Math.ceil((camera.y + VIEW_H) / T);
  for (let ty = y0; ty < y1; ty++){
    for (let tx = x0; tx < x1; tx++){
      if (tx<0||ty<0||tx>=CFG.COLS||ty>=CFG.ROWS) continue;
      if (map[ty][tx] === 1) continue;
      ctx.fillStyle = ((tx + ty) & 1) ? COL.floorA : COL.floorB;
      ctx.fillRect(tx*T, ty*T, T, T);
      ctx.strokeStyle = COL.grid;
      ctx.lineWidth = 1;
      ctx.strokeRect(tx*T + 0.5, ty*T + 0.5, T-1, T-1);
    }
  }
}

function drawWalls(){
  const T = CFG.TILE;
  const x0 = Math.floor(camera.x / T), x1 = Math.ceil((camera.x + VIEW_W) / T);
  const y0 = Math.floor(camera.y / T), y1 = Math.ceil((camera.y + VIEW_H) / T);
  for (let ty = y0; ty < y1; ty++){
    for (let tx = x0; tx < x1; tx++){
      if (tx<0||ty<0||tx>=CFG.COLS||ty>=CFG.ROWS) continue;
      if (map[ty][tx] !== 1) continue;
      const px = tx*T, py = ty*T;
      // steel base
      ctx.fillStyle = COL.steel;
      ctx.fillRect(px, py, T, T);
      // cardboard box stack on top
      ctx.fillStyle = COL.shelfSide;
      ctx.fillRect(px+2, py+2, T-4, T-4);
      ctx.fillStyle = COL.shelfTop;
      ctx.fillRect(px+2, py+2, T-4, (T-4)*0.6);
      ctx.strokeStyle = COL.shelfEdge;
      ctx.lineWidth = 1;
      ctx.strokeRect(px+2.5, py+2.5, T-5, T-5);
      // tape seam
      ctx.fillStyle = COL.shelfEdge;
      ctx.fillRect(px + T/2 - 1, py+2, 2, T-4);
    }
  }
}

function drawTerminals(){
  for (const t of terminals){
    const glow = 0.5 + 0.5 * Math.sin(t.pulse);
    const flash = t.hitFlash > 0;
    const emit = t.spawnFlash > 0;
    const tint = TERMINAL_TINT[t.type] || COL.terminalLit;
    ctx.fillStyle = flash ? "#ffffff" : COL.terminal;
    ctx.fillRect(t.x - 14, t.y - 14, 28, 28);
    ctx.strokeStyle = "#2a313c";
    ctx.lineWidth = 2;
    ctx.strokeRect(t.x - 14, t.y - 14, 28, 28);
    // emitter light — tinted to the enemy type this terminal produces
    ctx.fillStyle = emit ? "#ffffff" : tint;
    ctx.globalAlpha = emit ? 1 : (0.35 + 0.45 * glow);
    ctx.fillRect(t.x - 8, t.y - 8, 16, 16);
    ctx.globalAlpha = 1;
    ctx.fillStyle = "#0c0e12";
    ctx.fillRect(t.x - 9, t.y + 3, 18, 3);
    ctx.fillRect(t.x - 9, t.y + 7, 18, 2);
    // HP pips above (destroyable — GDD 6)
    for (let h = 0; h < CFG.TERMINAL.hp; h++){
      ctx.fillStyle = h < t.hp ? COL.atomic : "#2a313c";
      ctx.fillRect(t.x - 13 + h*7, t.y - 21, 5, 3);
    }
  }
}

function drawShots(){
  for (const s of shots){
    const wob = 1 + Math.sin(s.wob) * 0.12;
    // Triple Shot = opaque cleaning pod; base = translucent soap bubble.
    const fill = s.big ? "rgba(150,225,255,0.85)" : COL.bubbleFill;
    // soft glow
    ctx.fillStyle = s.big ? "rgba(120,210,255,0.45)" : COL.bubbleFill;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * 1.6 * wob, 0, Math.PI*2);
    ctx.fill();
    // bubble / pod body
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * wob, 0, Math.PI*2);
    ctx.fill();
    // iridescent rim (violet tint when bouncing)
    ctx.strokeStyle = s.bounce ? "rgba(200,150,255,0.95)" : COL.bubbleRim;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // highlight
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.beginPath();
    ctx.arc(s.x - s.r*0.35, s.y - s.r*0.35, s.r*0.28, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawMarks(){
  for (const m of marks){
    if (m.kind === "berserk"){
      // Expanding orange ring: Manager's on-death pulse made visible.
      const progress = 1 - m.life / 1.5;          // 0 at death -> 1 at end
      const rad = progress * 200;
      ctx.strokeStyle = "rgba(255,100,20," + (m.life / 1.5 * 0.75).toFixed(2) + ")";
      ctx.lineWidth = 4 - progress * 2.5;
      ctx.beginPath();
      ctx.arc(m.x, m.y, Math.max(1, rad), 0, Math.PI*2);
      ctx.stroke();
    } else if (m.kind === "debris"){
      ctx.fillStyle = "rgba(150,108,60," + (0.7 * m.life).toFixed(3) + ")";
      ctx.beginPath();
      ctx.arc(m.x, m.y, (m.size || 6) * (1.3 - m.life * 0.5), 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillStyle = "rgba(150,220,255," + (0.35 * m.life).toFixed(3) + ")";
      ctx.beginPath();
      ctx.arc(m.x, m.y, 7 * (1.2 - m.life * 0.4), 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawPickups(){
  for (const p of pickups){
    const def = POWERUPS[p.type];
    const bob = Math.sin(p.bob) * 3;
    const x = p.x, y = p.y + bob;
    // glow ring
    ctx.globalAlpha = 0.25 + 0.15 * (1 + Math.sin(p.bob*2));
    ctx.fillStyle = def.color;
    ctx.beginPath();
    ctx.arc(x, y, p.r + 6, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // badge
    ctx.fillStyle = "#11141a";
    ctx.fillRect(x - p.r, y - p.r, p.r*2, p.r*2);
    ctx.strokeStyle = def.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(x - p.r + 1, y - p.r + 1, p.r*2 - 2, p.r*2 - 2);
    // glyph
    ctx.fillStyle = def.color;
    ctx.font = "bold 16px 'Arial Black', sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(def.glyph, x, y + 1);
  }
}

function drawFloats(){
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "bold 13px 'Arial Black', sans-serif";
  for (const f of floats){
    ctx.globalAlpha = Math.min(1, f.life);
    ctx.fillStyle = "#000";
    ctx.fillText(f.text, f.x + 1, f.y + 1);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

function drawEnemies(){
  for (const e of enemies){
    // Berserk aura: orange pulsing ring around any robot buffed by a Manager death.
    if (e.berserk > 0 && e.spawn <= 0){
      const pulse = 0.5 + 0.5 * Math.sin(e.bob * 4);
      ctx.fillStyle = "rgba(255,100,20," + (0.13 + 0.09*pulse).toFixed(2) + ")";
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r + 7 + pulse * 3, 0, Math.PI*2);
      ctx.fill();
    }
    if (e.type === "forklift") drawForklift(e);
    else if (e.type === "security") drawSecurity(e);
    else if (e.type === "sorter") drawSorter(e);
    else if (e.type === "cleaner") drawCleaner(e);
    else if (e.type === "drone") drawDrone(e);
    else if (e.type === "manager") drawManager(e);
    else drawPicker(e);
  }
}

function drawPicker(e){
  const grow = e.spawn > 0 ? (1 - e.spawn/0.4) : 1;
  const r = e.r * grow;
  const bobY = Math.sin(e.bob) * 1.5;
  const x = e.x, y = e.y + bobY;
  const flash = e.hitFlash > 0;

  // tread/base
  ctx.fillStyle = "#3a1f1c";
  ctx.fillRect(x - r, y + r*0.4, r*2, r*0.7);
  // body
  ctx.fillStyle = flash ? "#ffffff" : COL.picker;
  ctx.fillRect(x - r, y - r, r*2, r*1.6);
  // top panel
  ctx.fillStyle = COL.pickerPanel;
  ctx.fillRect(x - r*0.7, y - r*0.8, r*1.4, r*0.5);
  // single eye, tracks Dan
  const ea = Math.atan2(dan.y - e.y, dan.x - e.x);
  const ex = x + Math.cos(ea) * r*0.25;
  const ey = y + Math.sin(ea) * r*0.25 - r*0.1;
  ctx.fillStyle = COL.pickerEye;
  ctx.beginPath();
  ctx.arc(ex, ey, r*0.32, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = "#7a3a12";
  ctx.beginPath();
  ctx.arc(ex, ey, r*0.14, 0, Math.PI*2);
  ctx.fill();
  // outline
  ctx.strokeStyle = "#5e1b14";
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x - r, y - r, r*2, r*1.6);
}

function drawForklift(e){
  const grow = e.spawn > 0 ? (1 - e.spawn/0.4) : 1;
  const r = e.r * grow;
  const x = e.x, y = e.y;
  const flash = e.hitFlash > 0;
  const charging = e.mode === "charge";
  // face the charge direction while locking/charging, else toward Dan
  const face = (charging || e.mode === "lock") ? e.cdir : Math.atan2(dan.y - e.y, dan.x - e.x);

  // wind-up telegraph: blinking red beam down the charge lane
  if (e.mode === "lock"){
    if ((Math.floor(e.timer * 16) % 2) === 0){
      ctx.strokeStyle = "rgba(255,91,77,0.75)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + Math.cos(e.cdir)*140, y + Math.sin(e.cdir)*140);
      ctx.stroke();
    }
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(face);
  // forks out front
  ctx.fillStyle = COL.forkliftFork;
  ctx.fillRect(r*0.55, -r*0.72, r*0.9, r*0.24);
  ctx.fillRect(r*0.55,  r*0.48, r*0.9, r*0.24);
  // chassis
  ctx.fillStyle = flash ? "#ffffff" : (charging ? COL.chargeWarn : COL.forkliftBody);
  ctx.fillRect(-r, -r*0.82, r*1.7, r*1.64);
  // hazard stripe
  ctx.fillStyle = flash ? "#ffffff" : COL.forkliftDark;
  ctx.fillRect(-r*0.2, -r*0.82, r*0.4, r*1.64);
  // cab
  ctx.fillStyle = flash ? "#ffffff" : "#2b2410";
  ctx.fillRect(-r*0.92, -r*0.5, r*0.6, r);
  // outline
  ctx.strokeStyle = "#5a4410";
  ctx.lineWidth = 2;
  ctx.strokeRect(-r, -r*0.82, r*1.7, r*1.64);
  ctx.restore();

  // HP pips above
  const max = ENEMY.forklift.hp;
  const pw = (2*r) / max;
  for (let h = 0; h < max; h++){
    ctx.fillStyle = h < e.hp ? "#ffd23f" : "#3a2f12";
    ctx.fillRect(x - r + h*pw, y - r - 9, pw - 2, 3);
  }
}

function drawSecurity(e){
  const grow = e.spawn > 0 ? (1 - e.spawn/0.4) : 1;
  const r = e.r * grow;
  const x = e.x, y = e.y;
  const flash = e.hitFlash > 0;
  const winding = e.winding > 0;
  // Face the latched aim while telegraphing, else track Dan.
  const face = winding ? e.aim : Math.atan2(dan.y - e.y, dan.x - e.x);

  // Telegraph: a thin charging beam down the aim lane just before firing.
  if (winding){
    ctx.strokeStyle = "rgba(139,228,255," + (0.5 + 0.5*Math.sin(e.winding*60)).toFixed(2) + ")";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(e.aim)*120, y + Math.sin(e.aim)*120);
    ctx.stroke();
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(face);

  // taser prongs out front (spark when winding)
  ctx.fillStyle = winding ? COL.bolt : COL.securityTrim;
  ctx.fillRect(r*0.6, -r*0.5, r*0.7, r*0.16);
  ctx.fillRect(r*0.6,  r*0.34, r*0.7, r*0.16);
  if (winding){
    ctx.fillStyle = COL.boltCore;
    ctx.beginPath();
    ctx.arc(r*1.3, 0, r*0.22 + Math.sin(e.winding*70)*1.5, 0, Math.PI*2);
    ctx.fill();
  }

  // chassis
  ctx.fillStyle = flash ? "#ffffff" : COL.securityBody;
  ctx.fillRect(-r*0.9, -r*0.85, r*1.7, r*1.7);
  // armored shoulders
  ctx.fillStyle = flash ? "#ffffff" : COL.securityDark;
  ctx.fillRect(-r*0.9, -r*0.85, r*0.45, r*1.7);
  // visor (brightens while charging a shot)
  ctx.fillStyle = flash ? "#ffffff" : COL.securityVisor;
  ctx.globalAlpha = winding ? 1 : 0.85;
  ctx.fillRect(r*0.05, -r*0.34, r*0.6, r*0.68);
  ctx.globalAlpha = 1;
  // outline
  ctx.strokeStyle = "#11151c";
  ctx.lineWidth = 2;
  ctx.strokeRect(-r*0.9, -r*0.85, r*1.7, r*1.7);
  ctx.restore();

  // HP pips above (3)
  const max = ENEMY.security.hp;
  const pw = (2*r) / max;
  for (let h = 0; h < max; h++){
    ctx.fillStyle = h < e.hp ? COL.bolt : "#22303a";
    ctx.fillRect(x - r + h*pw, y - r - 9, pw - 2, 3);
  }
}

function drawSorter(e){
  const grow = e.spawn > 0 ? (1 - e.spawn/0.4) : 1;
  const r = e.r * grow;
  const flash = e.hitFlash > 0;
  const scared = e.canSee;
  // Nervous shake while fleeing.
  const sh = scared ? Math.sin(e.bob * 6) * 1.6 : 0;
  const x = e.x + sh, y = e.y;

  ctx.save();
  ctx.translate(x, y);

  // squat rounded chassis
  ctx.fillStyle = flash ? "#ffffff" : COL.sorterBody;
  ctx.fillRect(-r*0.95, -r*0.7, r*1.9, r*1.5);
  ctx.fillStyle = flash ? "#ffffff" : COL.sorterDark;
  ctx.fillRect(-r*0.95, r*0.2, r*1.9, r*0.6);    // lower tray/lip
  ctx.strokeStyle = "#2c3520";
  ctx.lineWidth = 2;
  ctx.strokeRect(-r*0.95, -r*0.7, r*1.9, r*1.5);

  // two big nervous eyes (wide & jittering when scared)
  const eyeR = scared ? r*0.34 : r*0.26;
  const dartx = scared ? Math.sin(e.bob*7)*r*0.10 : 0;
  for (const sx of [-r*0.4, r*0.4]){
    ctx.fillStyle = "#11140d";
    ctx.fillRect(sx - eyeR, -r*0.42, eyeR*2, eyeR*2);
    ctx.fillStyle = flash ? "#ffffff" : COL.sorterEye;
    ctx.beginPath();
    ctx.arc(sx + dartx, -r*0.42 + eyeR, eyeR*0.62, 0, Math.PI*2);
    ctx.fill();
  }
  // little antenna — droops calm, springs up when panicking
  ctx.strokeStyle = COL.sorterDark;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -r*0.7);
  ctx.lineTo(scared ? r*0.1 : r*0.3, -r*(scared ? 1.15 : 0.95));
  ctx.stroke();
  ctx.fillStyle = scared ? COL.chargeWarn : COL.sorterEye;
  ctx.beginPath();
  ctx.arc(scared ? r*0.1 : r*0.3, -r*(scared ? 1.15 : 0.95), r*0.13, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // HP pips above (2)
  const max = ENEMY.sorter.hp;
  const pw = (2*r) / max;
  for (let h = 0; h < max; h++){
    ctx.fillStyle = h < e.hp ? COL.sorterEye : "#2c3520";
    ctx.fillRect(x - r + h*pw, y - r - 11, pw - 2, 3);
  }
}

function drawCleaner(e){
  const grow = e.spawn > 0 ? (1 - e.spawn/0.4) : 1;
  const r = e.r * grow;
  const x = e.x, y = e.y;
  const flash = e.hitFlash > 0;
  const d = ENEMY.cleaner;
  const winding = e.mode === "spray" && e.windup > 0;
  const active  = e.mode === "spray" && e.spraying;

  // --- spray cone (telegraph while winding, damaging green when active) ---
  // The cone is CLIPPED to wall geometry: each radial slice is truncated at the
  // first shelf, so the spray visibly stops at walls instead of bleeding through.
  if (winding || active){
    const half = d.sprayHalfAngle;
    const SEG = 16;
    ctx.save();
    if (active){
      const g = ctx.createRadialGradient(x, y, r*0.5, x, y, d.sprayRange);
      g.addColorStop(0, "rgba(155,255,122,0.45)");
      g.addColorStop(1, "rgba(95,208,106,0.04)");
      ctx.fillStyle = g;
    } else {
      ctx.fillStyle = "rgba(155,255,122,0.10)";   // faint warning during windup
    }
    // Build the clipped outline: apex + an arc whose radius is wall-limited.
    ctx.beginPath();
    ctx.moveTo(x, y);
    for (let s = 0; s <= SEG; s++){
      const aa = e.face - half + (s / SEG) * (2 * half);
      const rr = coneRayDist(x, y, aa, d.sprayRange);
      ctx.lineTo(x + Math.cos(aa) * rr, y + Math.sin(aa) * rr);
    }
    ctx.closePath();
    ctx.fill();
    if (active){
      // animated droplets drifting outward, each clamped to its slice's clip
      ctx.fillStyle = COL.spray;
      for (let i = 0; i < 7; i++){
        const t = (e.bob * 0.6 + i * 0.9) % 1;
        const aa = e.face - half + (i / 6) * (2 * half) + Math.sin(e.bob + i) * 0.05;
        const clip = coneRayDist(x, y, aa, d.sprayRange);
        const rr = clip * (0.25 + t * 0.7);
        ctx.globalAlpha = 1 - t;
        ctx.beginPath();
        ctx.arc(x + Math.cos(aa)*rr, y + Math.sin(aa)*rr, 2.2, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(e.face);
  // nozzle pointing along the spray heading
  ctx.fillStyle = active ? COL.spray : COL.cleanerNozzle;
  ctx.fillRect(r*0.5, -r*0.22, r*0.9, r*0.44);
  ctx.restore();

  ctx.save();
  ctx.translate(x, y);
  // round tank chassis
  ctx.fillStyle = flash ? "#ffffff" : COL.cleanerBody;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = flash ? "#ffffff" : COL.cleanerDark;
  ctx.fillRect(-r*0.85, r*0.1, r*1.7, r*0.7);     // lower band
  // solution tank window
  ctx.fillStyle = flash ? "#ffffff" : COL.cleanerTank;
  ctx.fillRect(-r*0.45, -r*0.55, r*0.9, r*0.7);
  ctx.fillStyle = COL.sprayDark;
  ctx.fillRect(-r*0.45, -r*0.2, r*0.9, r*0.35);    // liquid level
  ctx.strokeStyle = "#143b35";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();

  // HP pips above (2)
  const max = ENEMY.cleaner.hp;
  const pw = (2*r) / max;
  for (let h = 0; h < max; h++){
    ctx.fillStyle = h < e.hp ? COL.spray : "#1f3a33";
    ctx.fillRect(x - r + h*pw, y - r - 10, pw - 2, 3);
  }
}

// Aerial bomber. Drawn ELEVATED (body-anchored: e.x,e.y is the body you see and
// shoot) with a cast ground-shadow below it to read as flying. Rotors spin; the
// underside payload light pulses red as a bomb arms (complements the reticle).
function drawDrone(e){
  const grow = e.spawn > 0 ? (1 - e.spawn/0.4) : 1;
  const r = e.r * grow;
  const d = ENEMY.drone;
  const flash = e.hitFlash > 0;
  const bobY = Math.sin(e.bob) * 2;
  const x = e.x, y = e.y + bobY;             // hovering body
  const arming = e.dropCd < 0.34;            // about to drop -> underside warns

  // --- cast ground shadow (fixed below the body => altitude cue) ---
  const gy = e.y + d.altitude;
  ctx.fillStyle = COL.droneShadow;
  ctx.beginPath();
  ctx.ellipse(x, gy, r * 0.9, r * 0.42, 0, 0, Math.PI*2);
  ctx.fill();

  // --- rotor arms + spinning discs (four corners) ---
  const arm = r * 1.05;
  const corners = [[-1,-1],[1,-1],[-1,1],[1,1]];
  ctx.strokeStyle = flash ? "#ffffff" : COL.droneDark;
  ctx.lineWidth = 2.4;
  for (const [cx, cy] of corners){
    const ax = x + cx*arm*0.62, ay = y + cy*arm*0.62;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(ax, ay); ctx.stroke();
    // motor hub
    ctx.fillStyle = flash ? "#ffffff" : COL.droneDark;
    ctx.beginPath(); ctx.arc(ax, ay, r*0.22, 0, Math.PI*2); ctx.fill();
    // spinning rotor blur (two crossed translucent blades)
    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(e.rotor * (cx*cy < 0 ? 1 : -1));   // alternate spin direction
    ctx.fillStyle = COL.droneRotor;
    ctx.beginPath(); ctx.ellipse(0, 0, r*0.62, r*0.14, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0, 0, r*0.14, r*0.62, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // --- central chassis ---
  ctx.fillStyle = flash ? "#ffffff" : COL.droneBody;
  ctx.beginPath();
  ctx.arc(x, y, r*0.7, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = flash ? "#ffffff" : COL.droneDark;
  ctx.fillRect(x - r*0.5, y - r*0.16, r*1.0, r*0.32);   // body band
  ctx.strokeStyle = "#161c26";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(x, y, r*0.7, 0, Math.PI*2);
  ctx.stroke();

  // sensor eye, tracks Dan
  const ea = Math.atan2(dan.y - e.y, dan.x - e.x);
  const ex = x + Math.cos(ea) * r*0.2, ey = y + Math.sin(ea) * r*0.2;
  ctx.fillStyle = flash ? "#ffffff" : COL.droneEye;
  ctx.beginPath(); ctx.arc(ex, ey, r*0.26, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#3a0d12";
  ctx.beginPath(); ctx.arc(ex, ey, r*0.11, 0, Math.PI*2); ctx.fill();

  // underside payload light: cyan idle, pulsing red while a bomb arms
  const lit = arming
    ? (Math.floor(performance.now()/90) % 2 === 0)
    : false;
  ctx.fillStyle = arming ? (lit ? COL.bombLight : "#7c2a2a") : COL.droneLight;
  ctx.globalAlpha = arming ? 1 : 0.7;
  ctx.beginPath(); ctx.arc(x, y + r*0.42, r*0.16, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  // HP pips above (2)
  const max = ENEMY.drone.hp;
  const pwid = (2*r) / max;
  for (let h = 0; h < max; h++){
    ctx.fillStyle = h < e.hp ? COL.droneLight : "#1c2533";
    ctx.fillRect(x - r + h*pwid, y - r - 12, pwid - 2, 3);
  }
}

// Rare corporate overlord. Boss-tier: large dark-navy chassis, a missile launcher
// arm, and a red visor that flares while winding up a shot. HP pips = 6.
function drawManager(e){
  const grow = e.spawn > 0 ? (1 - e.spawn/0.4) : 1;
  const r = e.r * grow;
  const x = e.x, y = e.y;
  const flash = e.hitFlash > 0;
  const winding = e.winding > 0;
  const face = winding ? e.aim : Math.atan2(dan.y - e.y, dan.x - e.x);

  // Launch-telegraph: targeting beam down the aim lane, intensifies as it builds.
