  if (winding){
    const intensity = 1 - e.winding / ENEMY.manager.windup;   // 0..1
    ctx.strokeStyle = "rgba(255,80,20," + (0.25 + 0.55*intensity).toFixed(2) + ")";
    ctx.lineWidth = 2;
    ctx.setLineDash([6,5]);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(e.aim)*180, y + Math.sin(e.aim)*180);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(face);

  // Missile launcher tube extending from the front
  ctx.fillStyle = flash ? "#ffffff" : COL.missileFin;
  ctx.fillRect(r*0.58, -r*0.26, r*1.05, r*0.52);   // tube
  ctx.fillStyle = flash ? "#ffffff" : COL.missile;
  ctx.fillRect(r*1.42, -r*0.15, r*0.46, r*0.30);   // warhead stub (armed)
  if (winding){
    // Warhead tip brightens orange as it's about to launch
    ctx.fillStyle = COL.missileWarhead;
    ctx.beginPath();
    ctx.arc(r*1.88, 0, r*0.14, 0, Math.PI*2);
    ctx.fill();
  }

  // Body: boxy executive chassis (wider than tall = imposing silhouette)
  ctx.fillStyle = flash ? "#ffffff" : COL.managerBody;
  ctx.fillRect(-r, -r*0.88, r*1.82, r*1.78);
  // Left shoulder plate (darker armour panel)
  ctx.fillStyle = flash ? "#ffffff" : COL.managerDark;
  ctx.fillRect(-r, -r*0.88, r*0.40, r*1.78);
  // Lower trim band
  ctx.fillStyle = flash ? "#ffffff" : COL.managerDark;
  ctx.fillRect(-r, r*0.52, r*1.82, r*0.38);
  // Lapel / insignia stripe
  ctx.fillStyle = flash ? "#ffffff" : COL.managerTrim;
  ctx.fillRect(r*0.14, -r*0.88, r*0.11, r*1.08);

  // Visor: narrow red slit (flares brighter while telegraphing a shot)
  ctx.fillStyle = flash ? "#ffffff" : COL.managerEye;
  ctx.globalAlpha = winding ? 1 : 0.88;
  ctx.fillRect(r*0.20, -r*0.44, r*0.52, r*0.34);
  ctx.globalAlpha = 1;
  if (winding){
    // Hot white core — the "eye" charges up
    ctx.fillStyle = "rgba(255,200,150,0.7)";
    ctx.fillRect(r*0.22, -r*0.42, r*0.48, r*0.30);
  }

  // Outline
  ctx.strokeStyle = "#0a1018";
  ctx.lineWidth = 2;
  ctx.strokeRect(-r, -r*0.88, r*1.82, r*1.78);
  ctx.restore();

  // HP pips above (6) — red to mark boss tier
  const max = ENEMY.manager.hp;
  const pw = (2*r) / max;
  for (let h = 0; h < max; h++){
    ctx.fillStyle = h < e.hp ? COL.managerEye : "#1a1020";
    ctx.fillRect(x - r + h*pw, y - r - 11, pw - 2, 4);
  }
}

// Render every active enemy projectile by kind (taser bolt; lobbed box).
function drawEbolts(){
  for (const b of ebolts){
    if (b.kind === "bolt"){
      const ang = Math.atan2(b.vy, b.vx);
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(ang);
      // outer glow
      ctx.fillStyle = COL.boltGlow;
      ctx.beginPath();
      ctx.arc(0, 0, b.r * 2.1, 0, Math.PI*2);
      ctx.fill();
      // electric body — a short streak with a crackle wobble
      ctx.strokeStyle = COL.bolt;
      ctx.lineWidth = b.r * 1.1;
      ctx.lineCap = "round";
      const wob = Math.sin(b.spin) * b.r * 0.5;
      ctx.beginPath();
      ctx.moveTo(-b.r*1.8, 0);
      ctx.lineTo(0, wob);
      ctx.lineTo(b.r*1.8, 0);
      ctx.stroke();
      // hot white core
      ctx.fillStyle = COL.boltCore;
      ctx.beginPath();
      ctx.arc(0, 0, b.r * 0.55, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    } else if (b.kind === "arc"){
      // landing telegraph: fixed reticle at the impact point (whole flight)
      const pulse = 0.5 + 0.5 * Math.sin(b.spin * 0.6);
      ctx.strokeStyle = "rgba(255,120,90," + (0.35 + 0.35*pulse).toFixed(2) + ")";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(b.tx, b.ty, b.blast, 0, Math.PI*2);
      ctx.stroke();
      // moving ground shadow under the box (bigger/darker as it nears ground)
      const near = 1 - (b.height / (b.peak || 1));   // 0 high -> 1 grounded
      ctx.fillStyle = "rgba(0,0,0," + (0.12 + 0.22*near).toFixed(3) + ")";
      ctx.beginPath();
      ctx.ellipse(b.x, b.y, b.r * (0.7 + near*0.5), b.r * (0.4 + near*0.3), 0, 0, Math.PI*2);
      ctx.fill();
      // the tumbling cardboard box, lifted by its arc height
      ctx.save();
      ctx.translate(b.x, b.y - b.height);
      ctx.rotate(b.spin * 0.5);
      ctx.fillStyle = COL.box;
      ctx.fillRect(-b.r, -b.r, b.r*2, b.r*2);
      ctx.fillStyle = COL.boxDark;
      ctx.fillRect(-b.r, b.r*0.3, b.r*2, b.r*0.7);     // shaded lower flap
      ctx.strokeStyle = COL.boxTape;                    // packing-tape seam
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-b.r, 0); ctx.lineTo(b.r, 0);
      ctx.moveTo(0, -b.r); ctx.lineTo(0, b.r);
      ctx.stroke();
      ctx.strokeStyle = COL.boxDark;
      ctx.strokeRect(-b.r, -b.r, b.r*2, b.r*2);
      ctx.restore();
    } else if (b.kind === "drop"){
      // Fixed landing reticle (whole descent): blast ring + crosshair ticks.
      const pulse = 0.5 + 0.5 * Math.sin(b.spin * 0.8);
      ctx.strokeStyle = "rgba(255,140,60," + (0.4 + 0.45*pulse).toFixed(2) + ")";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(b.tx, b.ty, b.blast, 0, Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      for (const a of [0, Math.PI/2, Math.PI, -Math.PI/2]){
        ctx.moveTo(b.tx + Math.cos(a)*(b.blast-5), b.ty + Math.sin(a)*(b.blast-5));
        ctx.lineTo(b.tx + Math.cos(a)*(b.blast+4), b.ty + Math.sin(a)*(b.blast+4));
      }
      ctx.stroke();

      // Growing ground shadow under the falling bomb (darkens as it nears).
      const near = 1 - (b.height / (b.h0 || 1));    // 0 high -> 1 grounded
      ctx.fillStyle = "rgba(0,0,0," + (0.1 + 0.3*near).toFixed(3) + ")";
      ctx.beginPath();
      ctx.ellipse(b.tx, b.ty, b.r * (0.5 + near*0.8), b.r * (0.3 + near*0.45), 0, 0, Math.PI*2);
      ctx.fill();

      // The package bomb, descending vertically onto the reticle. Fake
      // perspective: starts ~2x size and shrinks to 1x as it nears the ground.
      const pscale = 1 + (b.height / (b.h0 || 1));   // 2 at release -> 1 at landing
      ctx.save();
      ctx.translate(b.tx, b.ty - b.height);
      ctx.scale(pscale, pscale);
      ctx.rotate(b.spin * 0.35);
      ctx.fillStyle = COL.bomb;
      ctx.fillRect(-b.r, -b.r, b.r*2, b.r*2);
      ctx.fillStyle = COL.bombDark;
      ctx.fillRect(-b.r, b.r*0.3, b.r*2, b.r*0.7);          // shaded lower flap
      // hazard chevrons across the top (reads as "armed", not just cardboard)
      ctx.fillStyle = COL.bombStripe;
      ctx.fillRect(-b.r, -b.r*0.55, b.r*2, b.r*0.3);
      ctx.fillStyle = COL.bombDark;
      ctx.fillRect(-b.r*0.55, -b.r*0.55, b.r*0.3, b.r*0.3);
      ctx.fillRect( b.r*0.25, -b.r*0.55, b.r*0.3, b.r*0.3);
      ctx.strokeStyle = COL.bombDark;
      ctx.lineWidth = 2;
      ctx.strokeRect(-b.r, -b.r, b.r*2, b.r*2);
      // blinking red arming light
      ctx.fillStyle = (Math.floor(performance.now()/80) % 2 === 0) ? COL.bombLight : "#5c1414";
      ctx.beginPath();
      ctx.arc(0, b.r*0.62, b.r*0.22, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    } else if (b.kind === "homing"){
      // Slow tracking missile: a rocket silhouette oriented along its velocity.
      const ang = Math.atan2(b.vy, b.vx);
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(ang);

      // Engine glow / exhaust plume behind the missile
      ctx.fillStyle = "rgba(255,160,40,0.55)";
      ctx.beginPath();
      ctx.moveTo(-b.r * 1.1, 0);
      ctx.lineTo(-b.r * 2.9, -b.r * 0.44);
      ctx.lineTo(-b.r * 3.6, 0);
      ctx.lineTo(-b.r * 2.9,  b.r * 0.44);
      ctx.closePath();
      ctx.fill();
      // Outer heat glow
      ctx.fillStyle = "rgba(255,80,20,0.18)";
      ctx.beginPath();
      ctx.arc(0, 0, b.r * 2.8, 0, Math.PI*2);
      ctx.fill();

      // Body
      ctx.fillStyle = COL.missile;
      ctx.fillRect(-b.r * 1.0, -b.r * 0.5, b.r * 2.0, b.r);
      // Warning stripe
      ctx.fillStyle = COL.bombStripe;
      ctx.fillRect(-b.r * 0.28, -b.r * 0.5, b.r * 0.46, b.r);

      // Warhead (tapered nose)
      ctx.fillStyle = COL.missileWarhead;
      ctx.beginPath();
      ctx.moveTo(b.r * 1.0,  -b.r * 0.5);
      ctx.lineTo(b.r * 2.3,   0);
      ctx.lineTo(b.r * 1.0,   b.r * 0.5);
      ctx.closePath();
      ctx.fill();

      // Tail fins
      ctx.fillStyle = COL.missileFin;
      ctx.beginPath();
      ctx.moveTo(-b.r, 0);
      ctx.lineTo(-b.r * 1.6, -b.r * 0.95);
      ctx.lineTo(-b.r * 0.7, -b.r * 0.5);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-b.r, 0);
      ctx.lineTo(-b.r * 1.6,  b.r * 0.95);
      ctx.lineTo(-b.r * 0.7,  b.r * 0.5);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }
  }
}

function drawDan(){
  // Cleaner-slow aura: green ring + drips while the debuff is active.
  if (dan.slow > 0){
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = COL.spray;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(dan.x, dan.y, dan.r + 4, 0, Math.PI*2);
    ctx.stroke();
    ctx.fillStyle = COL.sprayDark;
    for (let i = 0; i < 3; i++){
      const a = (dan.iframe + i) + performance.now() * 0.003 + i * 2.1;
      ctx.beginPath();
      ctx.arc(dan.x + Math.cos(a)*(dan.r+4), dan.y + Math.sin(a)*(dan.r+4), 1.8, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  ctx.save();
  ctx.translate(dan.x, dan.y);

  // flash white briefly during i-frames
  const hurt = dan.iframe > 0 && (Math.floor(dan.iframe * 20) % 2 === 0);

  // mop / soap launcher pointing at cursor (drawn under body's near side)
  ctx.save();
  ctx.rotate(dan.angle);
  ctx.fillStyle = COL.danMop;
  ctx.fillRect(dan.r - 2, -3, 16, 6);          // launcher barrel
  ctx.fillStyle = COL.soap;
  ctx.fillRect(dan.r + 12, -2, 3, 4);          // nozzle tip
  ctx.restore();

  // body (coveralls)
  ctx.fillStyle = hurt ? "#ffffff" : COL.danBody;
  ctx.beginPath();
  ctx.arc(0, 0, dan.r, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = hurt ? "#ffffff" : COL.danTrim;
  ctx.beginPath();
  ctx.arc(0, 0, dan.r, Math.PI*0.15, Math.PI*0.85);
  ctx.fill();
  // head
  ctx.fillStyle = hurt ? "#ffffff" : COL.danSkin;
  ctx.beginPath();
  ctx.arc(0, -2, dan.r*0.5, 0, Math.PI*2);
  ctx.fill();
  // outline
  ctx.strokeStyle = "#0f2a47";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, dan.r, 0, Math.PI*2);
  ctx.stroke();

  ctx.restore();
}

/* ---- HUD + screens ------------------------------------------------------ */
function drawHUD(){
  // HP bar
  const pad = 16, barW = 220, barH = 18;
  ctx.fillStyle = "#0c0e12";
  ctx.fillRect(pad-3, pad-3, barW+6, barH+6);
  ctx.fillStyle = "#331210";
  ctx.fillRect(pad, pad, barW, barH);
  const frac = Math.max(0, dan.hp / dan.maxHp);
  const grad = ctx.createLinearGradient(pad, 0, pad+barW, 0);
  grad.addColorStop(0, "#ff5b4d");
  grad.addColorStop(1, "#ffb627");
  ctx.fillStyle = grad;
  ctx.fillRect(pad, pad, barW * frac, barH);
  ctx.strokeStyle = "#000"; ctx.lineWidth = 1;
  ctx.strokeRect(pad+0.5, pad+0.5, barW-1, barH-1);

  ctx.font = "bold 12px 'Courier New', monospace";
  ctx.fillStyle = COL.text;
  ctx.textAlign = "left"; ctx.textBaseline = "middle";
  ctx.fillText("HP " + Math.max(0, dan.hp) + " / " + dan.maxHp, pad + 6, pad + barH/2 + 1);

  // Active power-up counters (remaining enhanced shots), stacked below HP.
  let py = pad + barH + 8;
  for (const key of POWERUP_KEYS){
    const n = powerups[key];
    if (n <= 0) continue;
    const def = POWERUPS[key];
    const pw = 132, ph = 16;
    ctx.fillStyle = "#0c0e12";
    ctx.fillRect(pad, py, pw, ph);
    // color chip
    ctx.fillStyle = def.color;
    ctx.fillRect(pad + 2, py + 2, 12, ph - 4);
    ctx.fillStyle = "#11141a";
    ctx.font = "bold 10px 'Arial Black', sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(def.glyph, pad + 8, py + ph/2 + 1);
    // label + count
    ctx.fillStyle = def.color;
    ctx.font = "bold 11px 'Courier New', monospace";
    ctx.textAlign = "left";
    ctx.fillText(def.label, pad + 20, py + ph/2 + 1);
    ctx.fillStyle = COL.text;
    ctx.textAlign = "right";
    ctx.fillText("x" + n, pad + pw - 6, py + ph/2 + 1);
    py += ph + 4;
  }

  // Score
  ctx.textAlign = "right";
  ctx.textBaseline = "alphabetic";
  ctx.font = "bold 22px 'Arial Black', sans-serif";
  ctx.fillStyle = COL.soap;
  ctx.fillText(String(GAME.score).padStart(6, "0"), VIEW_W - pad, pad + 18);
  ctx.font = "bold 10px 'Courier New', monospace";
  ctx.fillStyle = "#6f7884";
  ctx.fillText("SCORE", VIEW_W - pad, pad + 34);

  // Level + current enemy type (top center)
  ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
  ctx.font = "bold 16px 'Arial Black', sans-serif";
  ctx.fillStyle = COL.amber;
  const typeName = { picker:"PICKER BOT", forklift:"FORKLIFT BOT", security:"SECURITY BOT", sorter:"SORTER BOT", cleaner:"CLEANER BOT", drone:"DRONE", manager:"MANAGER BOT" }[levelType()] || "";
  ctx.fillText("LEVEL " + GAME.level + "  ·  " + typeName, VIEW_W/2, pad + 14);
}

function drawLevelClear(){
  ctx.fillStyle = "rgba(8,12,9,0.72)";
  ctx.fillRect(0,0,VIEW_W,VIEW_H);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";

  ctx.font = "bold 50px 'Arial Black', sans-serif";
  ctx.fillStyle = COL.atomic;
  ctx.fillText("LEVEL CLEARED", VIEW_W/2, VIEW_H/2 - 28);

  ctx.font = "bold 26px 'Arial Black', sans-serif";
  ctx.fillStyle = COL.amber;
  ctx.fillText("ENTERING LEVEL " + (GAME.level + 1), VIEW_W/2, VIEW_H/2 + 26);

  ctx.font = "bold 12px 'Courier New', monospace";
  ctx.fillStyle = "#aeb6c0";
  ctx.fillText("HP & POWER-UPS CARRY OVER", VIEW_W/2, VIEW_H/2 + 60);
}

function drawTitle(){
  // dim warehouse backdrop
  ctx.fillStyle = "#15181f";
  ctx.fillRect(0,0,VIEW_W,VIEW_H);
  ctx.fillStyle = "#1c2129";
  for (let y=0; y<VIEW_H; y+=48) for (let x=0; x<VIEW_W; x+=48)
    if (((x+y)/48)&1) ctx.fillRect(x,y,48,48);

  ctx.textAlign = "center"; ctx.textBaseline = "middle";

  // ATOMIC — atomic green
  ctx.font = "bold 64px 'Arial Black', sans-serif";
  ctx.fillStyle = COL.atomic;
  ctx.fillText("ATOMIC", VIEW_W/2, VIEW_H/2 - 86);
  // DUSTBIN — amber
  ctx.fillStyle = COL.amber;
  ctx.fillText("DUSTBIN", VIEW_W/2, VIEW_H/2 - 22);
  // DAN — soap, oversized
  ctx.font = "bold 92px 'Arial Black', sans-serif";
  ctx.fillStyle = COL.soap;
  ctx.fillText("DAN", VIEW_W/2, VIEW_H/2 + 56);

  ctx.font = "bold 14px 'Courier New', monospace";
  ctx.fillStyle = "#aeb6c0";
  ctx.fillText("THE ROBOTS HAVE TURNED. GRAB YOUR MOP.", VIEW_W/2, VIEW_H/2 + 122);

  const blink = (Math.floor(performance.now()/500)%2)===0;
  if (blink){
    ctx.fillStyle = "#fff";
    ctx.font = "bold 16px 'Courier New', monospace";
    ctx.fillText("CLICK or PRESS SPACE to START", VIEW_W/2, VIEW_H/2 + 158);
  }
  if (GAME.high > 0){
    ctx.fillStyle = "#6f7884";
    ctx.font = "bold 11px 'Courier New', monospace";
    ctx.fillText("HIGH SCORE  " + String(GAME.high).padStart(6,"0"), VIEW_W/2, VIEW_H - 22);
  }

  drawFireLegend(28, VIEW_H - 150);
}

// Compact 3x3 reference of the keyboard fire grid (GDD 4.3).
function drawFireLegend(ox, oy){
  const cell = 30, gap = 4;
  const labels = [
    ["I","↖"], ["O","↑"], ["P","↗"],
    ["K","←"], ["L","·"], [";","→"],
    [",","↙"], [".","↓"], ["/","↘"],
  ];
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = "#9aa3ae";
  ctx.font = "bold 10px 'Courier New', monospace";
  ctx.fillText("KEYBOARD FIRE", ox + (cell*3 + gap*2)/2, oy - 12);

  for (let i = 0; i < 9; i++){
    const r = (i/3)|0, c = i%3;
    const x = ox + c*(cell+gap), y = oy + r*(cell+gap);
    const center = (i === 4);
    ctx.fillStyle = center ? "#15181f" : "#232a34";
    ctx.fillRect(x, y, cell, cell);
    ctx.strokeStyle = center ? "#3a4250" : COL.soap;
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, cell - 1, cell - 1);
    ctx.fillStyle = center ? "#5a636f" : "#dfe6ee";
    ctx.font = "bold 12px 'Courier New', monospace";
    ctx.fillText(labels[i][0], x + cell/2, y + cell/2 - 5);
    ctx.fillStyle = center ? "#5a636f" : COL.amber;
    ctx.font = "bold 12px 'Arial', sans-serif";
    ctx.fillText(labels[i][1], x + cell/2, y + cell/2 + 7);
  }
}

function drawGameOver(){
  ctx.fillStyle = "rgba(8,10,14,0.78)";
  ctx.fillRect(0,0,VIEW_W,VIEW_H);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";

  ctx.font = "bold 60px 'Arial Black', sans-serif";
  ctx.fillStyle = "#ff5b4d";
  ctx.fillText("DAN IS DOWN", VIEW_W/2, VIEW_H/2 - 50);

  ctx.font = "bold 22px 'Arial Black', sans-serif";
  ctx.fillStyle = COL.soap;
  ctx.fillText("SCORE  " + String(GAME.score).padStart(6,"0"), VIEW_W/2, VIEW_H/2 + 14);
  ctx.fillStyle = COL.amber;
  ctx.fillText("BEST   " + String(GAME.high).padStart(6,"0"), VIEW_W/2, VIEW_H/2 + 46);

  const blink = (Math.floor(performance.now()/500)%2)===0;
  if (blink){
    ctx.fillStyle = "#fff";
    ctx.font = "bold 15px 'Courier New', monospace";
    ctx.fillText("CLICK or PRESS SPACE to TRY AGAIN", VIEW_W/2, VIEW_H/2 + 100);
  }
}

/* ---- Main loop (delta-timed) -------------------------------------------- */
let last = performance.now();
function loop(now){
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.05) dt = 0.05;        // clamp to avoid tunneling on lag spikes
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
