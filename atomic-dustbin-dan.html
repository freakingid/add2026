<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atomic Dustbin Dan</title>
<style>
  :root{
    --concrete:#1c1f26;
    --grid:#262b34;
    --amber:#ffb627;
    --soap:#5fd2ff;
    --atomic:#5dff8f;
    --ink:#0c0e12;
  }
  html,body{
    margin:0; height:100%;
    background:
      radial-gradient(circle at 50% 0%, #20242c 0%, #0c0e12 70%);
    color:#e8ebef;
    font-family:"Arial Black","Arial",sans-serif;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    user-select:none;
  }
  #wrap{
    position:relative;
    width:min(96vw, 960px);
  }
  canvas{
    display:block;
    width:100%;
    height:auto;
    aspect-ratio:3/2;
    background:var(--concrete);
    border:3px solid #3a4049;
    border-radius:6px;
    box-shadow:0 0 0 2px #14171d, 0 24px 60px rgba(0,0,0,.6),
               inset 0 0 80px rgba(0,0,0,.5);
    image-rendering:pixelated;
    cursor:crosshair;
  }
  #hint{
    margin-top:10px; text-align:center;
    font-family:"Courier New",monospace; font-weight:bold;
    letter-spacing:1px; font-size:12px; color:#6f7884;
  }
  #hint b{color:var(--amber)}
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="960" height="640"></canvas>
    <div id="hint">WASD <b>move</b> &nbsp;·&nbsp; MOUSE <b>aim/fire</b> &nbsp;·&nbsp; O P L K <b>fire</b> (+ adjacent = diagonal) &nbsp;·&nbsp; E/F <b>dustbin</b> &nbsp;·&nbsp; GAMEPAD <b>supported</b></div>
  </div>

<script type="module">
/* Atomic Dustbin Dan — entry point.
   All game code lives in ES modules under src/ (see STATUS.md "Architecture map").
   This file only wires the delta-timed loop: update(dt) then render().
   Serve over http(s) — file:// blocks ES module loads (e.g. python3 -m http.server). */
import "./src/input.js";                 // registers key/mouse/touch listeners (side-effect)
import { update } from "./src/update.js";
import { render } from "./src/render.js";

/* ---- Main loop (delta-timed) -------------------------------------------- */
let last = performance.now();
function loop(now){
  let dt = (now - last) / 1000;
  last = now;
  if (dt > 0.05) dt = 0.05;        // clamp to avoid tunneling on lag spikes
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
